            { ch: 1, c: 28, q: "Trong hệ sinh thái phần mềm Google Workspace, công cụ nào chuyên dụng để xử lý số liệu và lập bảng tính tương tự như Microsoft Excel?", arr: ["Google Docs", "Google Slides", "Google Sheets", "Google Keep"], ans: "C" },

            { ch: 1, c: 37, q: "Mục đích quan trọng nhất của việc cập nhật (Update) phần mềm ứng dụng thường xuyên là gì?", arr: ["Làm thay đổi hoàn toàn giao diện để người dùng không bị nhàm chán.", "Vá các lỗ hổng bảo mật và bổ sung thêm các tính năng mới tối ưu hơn.", "Chuyển đổi ứng dụng từ dạng trả phí sang dạng miễn phí.", "Giải phóng toàn bộ dung lượng RAM của máy tính."], ans: "B" },
            { ch: 1, c: 38, q: "Nguyên tắc cơ bản nhất để bảo vệ máy tính khỏi virus và phần mềm độc hại khi tiến hành cài đặt ứng dụng là gì?", arr: ["Chỉ tải tệp cài đặt từ trang web chính thức của nhà phát triển hoặc cửa hàng ứng dụng uy tín.", "Chỉ cài đặt các phần mềm được chia sẻ qua email không rõ nguồn gốc.", "Tắt mọi phần mềm bảo mật của hệ điều hành trước khi tải tệp cài đặt.", "Luôn chấp nhận cài đặt mọi thanh công cụ (toolbar) và phần mềm quảng cáo đi kèm."], ans: "A" },
            { ch: 1, c: 39, q: "Yếu tố cốt lõi nào cho phép một chiếc máy tính có thể xử lý được vô số loại hình dữ liệu khác nhau (văn bản, hình ảnh, âm thanh, video)?", arr: ["Khability kết nối Internet không dây.", "Việc biểu diễn và xử lý thông tin dưới dạng số hóa (tín hiệu nhị phân với các bit 0 và 1).", "Kích thước màn hình lớn với độ phân giải cao.", "Việc sở hữu số lượng lớn các cổng kết nối ngoại vi."], ans: "B" },
            { ch: 1, c: 40, q: "Đặc điểm cần lưu ý nhất khi sử dụng chuẩn cáp kết nối USB-C hiện đại là gì?", arr: ["Tất cả các cổng USB-C đều chỉ có thể sạc pin, không thể truyền dữ liệu.", "USB-C chỉ tương thích với các thiết bị di động, không sử dụng được cho laptop.", "Tốc độ và chức năng (như xuất màn hình, truyền dữ liệu siêu tốc) của cổng USB-C phụ thuộc vào giao thức mà nó hỗ trợ (ví dụ: USB 3.2 hay Thunderbolt).", "Cổng USB-C không bao giờ truyền tải được băng thông quá 1 Gbps."], ans: "C" },
            { ch: 1, c: 41, q: "Sinh viên A thường xuyên phải làm việc với các tệp dữ liệu thực hành dung lượng lớn và phàn nàn rằng laptop của mình khởi động Windows cũng như mở phần mềm rất chậm. Giải pháp phần cứng nào sau đây là hiệu quả nhất để khắc phục triệt để tình trạng 'thắt cổ chai' tốc độ này?", arr: ["Cài đặt lại toàn bộ hệ điều hành sang một phiên bản cũ hơn.", "Nâng cấp từ ổ cứng cơ (HDD) sang ổ cứng thể rắn (SSD, ưu tiên chuẩn NVMe).", "Mua thêm một màn hình rời có độ phân giải cao để hiển thị nhiều thông tin hơn.", "Thay thế cáp mạng Ethernet đang dùng bằng kết nối Wi-Fi."], ans: "B" },
            { ch: 1, c: 42, q: "Bạn đang tư vấn chọn mua laptop cho một sinh viên ngành Truyền thông đa phương tiện. Người này cần xuất hình ảnh ra 2 màn hình rời 4K để làm việc và thường xuyên phải sao chép các dự án video nặng hàng trăm Gigabyte ra ổ cứng ngoài. Bạn nên khuyên người đó ưu tiên laptop có loại cổng kết nối nào?", arr: ["Cổng VGA truyền thống.", "Cổng USB-C chỉ hỗ trợ giao thức USB 3.2 cơ bản.", "Cổng kết nối cáp mạng LAN (RJ45).", "Cổng USB-C có hỗ trợ giao thức Thunderbolt (có biểu tượng tia sét)."], ans: "D" },
            { ch: 1, c: 43, q: "Sinh viên B đang viết khóa luận tốt nghiệp và cảm thấy cực kỳ mất thời gian khi phải gõ thủ công từng trích dẫn tài liệu tham khảo theo đúng chuẩn quốc tế (APA), đồng thời rất dễ sắp xếp sai thứ tự. Để giải quyết vấn đề này một cách tự động và chuyên nghiệp, B nên sử dụng công cụ nào?", arr: ["Tận dụng tính năng đánh số thứ tự (Numbering) mặc định của Google Docs.", "Sử dụng các phần mềm quản lý tài liệu tham khảo chuyên dụng như Mendeley hoặc Zotero.", "Sao chép trực tiếp cách trích dẫn từ Wikipedia vào Microsoft Word.", "Sử dụng phần mềm lập kế hoạch như Trello để ghi nhớ các bài báo đã đọc."], ans: "B" },
            { ch: 1, c: 44, q: "Tại căn tin trường đại học, bạn thấy một sinh viên chỉ cần đưa mặt lưng của chiếc điện thoại thông minh (đã liên kết thẻ ngân hàng) chạm nhẹ vào máy quẹt thẻ POS là thanh toán thành công trong 1 giây mà không cần quét mã QR hay kết nối Wi-Fi. Công nghệ cốt lõi nào đã được sử dụng trong tình huống này?", arr: ["Bluetooth 5.0", "Wi-Fi 7", "NFC (Giao tiếp trường gần)", "Hệ thống định vị toàn cầu (GPS)"], ans: "C" },
            { ch: 1, c: 45, q: "Thay vì ghi chép các môn học vào nhiều cuốn sổ tay giấy dễ thất lạc, một sinh viên muốn xây dựng một 'bộ não số'. Yêu cầu là ứng dụng này có thể ghi văn bản, tạo bảng cơ sở dữ liệu, chèn tài liệu đa phương tiện và đặc biệt là liên kết chéo các ghi chú lại với nhau. Lựa chọn nào sau đây là tối ưu nhất?", arr: ["Microsoft Notepad", "Google Keep", "Notion hoặc Obsidian", "Microsoft PowerPoint"], ans: "C" },
            
            // [{ // === CHƯƠNG 2: KHAI THÁC DỮ LIỆU VÀ THÔNG TIN (CÂU 1 - 45) ===
            { ch: 2, c: 1, q: "Trong môi trường số, yếu tố nào được định nghĩa là các sự kiện, số liệu, ký hiệu thô, chưa được xử lý và tự nó không mang nhiều ý nghĩa?", arr: ["Tri thức", "Thông tin", "Dữ liệu", "Sự thông thái"], ans: "C" },
            { ch: 2, c: 2, q: "Khi dữ liệu thô được xử lý, tổ chức, cấu trúc và đặt vào một ngữ cảnh cụ thể để trả lời các câu hỏi như *ai, cái gì, ở đâu, khi nào*, nó sẽ trở thành gì?", arr: ["Dữ liệu số", "Thông tin", "Tri thức", "Mã nguồn"], ans: "B" },
            { ch: 2, c: 3, q: "Khái niệm nào thể hiện sự hiểu biết, nhận thức có được từ việc phân tích, tổng hợp, đánh giá và áp dụng thông tin để đưa ra nhận định hay dự đoán?", arr: ["Dữ liệu", "Thông tin", "Tri thức", "Sự thông thái"], ans: "C" },
            { ch: 2, c: 4, q: "Kim tự tháp biểu diễn mối quan hệ của mô hình DIKW có thứ tự từ nền tảng lên đỉnh cao nhất lần lượt là gì?", arr: ["Dữ liệu - Tri thức - Thông tin - Sự thông thái", "Dữ liệu - Thông tin - Tri thức - Sự thông thái", "Thông tin - Dữ liệu - Tri thức - Sự thông thái", "Tri thức - Dữ liệu - Thông tin - Sự thông thái"], ans: "B" },
            { ch: 2, c: 5, q: "Bản chất của Tri thức (Knowledge) giúp con người mục đích giải quyết nhóm câu hỏi nào dưới đây?", arr: ["Cái gì? Bao nhiêu? Khi nào?", "Ai? Ở đâu? Khi nào?", "Tại sao? Như thế nào? Nên làm gì?", "Ai làm? Làm lúc nào? Ở đâu?"], ans: "C" },
            { ch: 2, c: 6, q: "Loại dữ liệu được tổ chức rõ ràng theo các hàng và các cột (ví dụ như bảng tính Excel hoặc cơ sở dữ liệu quan hệ) thuộc phân loại cấu trúc nào?", arr: ["Dữ liệu phi cấu trúc", "Dữ liệu bán cấu trúc", "Dữ liệu có cấu trúc", "Dữ liệu thô"], ans: "C" },
            { ch: 2, c: 7, q: "Tập hợp các tệp tài liệu sử dụng thẻ đánh dấu như tệp XML, JSON thuộc loại dữ liệu nào?", arr: ["Dữ liệu có cấu trúc", "Dữ liệu bán cấu trúc", "Dữ liệu phi cấu trúc", "Dữ liệu văn bản thuần túy"], ans: "B" },
            { ch: 2, c: 8, q: "Văn bản Word, Email, hình ảnh, video và âm thanh được phân vào loại dữ liệu nào dưới đây?", arr: ["Dữ liệu có cấu trúc", "Dữ liệu bán cấu trúc", "Dữ liệu phi cấu trúc", "Dữ liệu phân tách bằng dấu phẩy"], ans: "C" },
            { ch: 2, c: 9, q: "Định dạng tệp văn bản nào dưới đây là định dạng tài liệu di động, giúp giữ nguyên định dạng gốc trên mọi thiết bị, lý tưởng để chia sẻ nhưng khó chỉnh sửa trực tiếp?", arr: [".txt", ".docx", ".pdf", ".csv"], ans: "C" },
            { ch: 2, c: 10, q: "Định dạng tệp .csv (Comma-Separated Values) được ứng dụng phổ biến cho mục đích nào dưới đây?", arr: ["Lưu trữ văn bản thuần túy không định dạng", "Định dạng hình ảnh nén chất lượng cao", "Dễ dàng trao đổi dữ liệu bảng tính giữa các phần mềm phân tích dữ liệu", "Nén nhiều tệp tin để giảm dung lượng khi gửi đi"], ans: "C" },
            { ch: 2, c: 11, q: "Nhóm định dạng nào dưới đây chuyên dùng để nén nhiều tệp hoặc thư mục thành một tệp duy nhất nhằm giảm dung lượng và thuận tiện khi gửi đi?", arr: [".mp3, .wav", ".mp4, .mov", ".zip, .rar", ".jpg, .png"], ans: "C" },
            { ch: 2, c: 12, q: "Thuật ngữ \"Dữ liệu lớn\" (Big Data) dùng để chỉ các tập dữ liệu có đặc điểm cốt lõi nào?", arr: ["Khối lượng cực lớn, tốc độ tạo ra rất nhanh và đa dạng về chủng loại", "Chỉ bao gồm các dữ liệu có cấu trúc từ bảng tính Excel", "Khối lượng nhỏ nhưng độ bảo mật và độ tin cậy tuyệt đối", "Chỉ lưu trữ các tệp đa phương tiện dung lượng cao"], ans: "A" },
            { ch: 2, c: 13, q: "Trong mô hình \"5Vs\" của Big Data, đặc trưng \"Velocity\" đại diện cho yếu tố nào dưới đây?", arr: ["Lượng dữ liệu khổng lồ tính bằng Terabytes hay Petabytes", "Dữ liệu được tạo ra và cần được xử lý với tốc độ rất nhanh, gần như theo thời gian thực", "Sự đa dạng về nguồn và định dạng của dữ liệu", "Chất lượng và độ tin cậy chính xác của dữ liệu"], ans: "B" },
            { ch: 2, c: 14, q: "Đặc trưng nào trong mô hình \"5Vs\" của Big Data phản ánh chất lượng dữ liệu không đồng đều, chứa nhiều sự không nhất quán và đòi hỏi phải làm sạch?", arr: ["Volume", "Variety", "Veracity", "Value"], ans: "C" },
            { ch: 2, c: 15, q: "Yếu tố nào được coi là quan trọng nhất trong mô hình \"5Vs\" của Big Data, thể hiện khả năng phân tích dữ liệu để tìm ra các hiểu biết sâu sắc (insights)?", arr: ["Value", "Velocity", "Variety", "Volume"], ans: "A" },
            { ch: 2, c: 16, q: "Việc các sàn thương mại điện tử lớn (như Amazon) phân tích hành vi khách hàng để cá nhân hóa trải nghiệm và đề xuất sản phẩm là ứng dụng của Big Data trong lĩnh vực nào?", arr: ["Y tế", "Kinh doanh và Marketing", "Chính phủ công", "Nông nghiệp công nghệ cao"], ans: "B" },
            { ch: 2, c: 17, q: "Ứng dụng của Big Data và AI trong lĩnh vực Y tế đem lại lợi ích chủ yếu nào dưới đây?", arr: ["Cá nhân hóa lộ trình học tập của học sinh", "Quản lý đô thị thông minh và căn cước công dân", "Dự báo dịch bệnh, nghiên cứu thuốc mới và cá nhân hóa phác đồ điều trị", "Dự báo sâu bệnh và bón phân tự động"], ans: "C" },
            { ch: 2, c: 18, q: "Khi thiết lập cấu trúc thư mục logic để quản lý tài liệu trên máy tính hoặc đám mây, sinh viên nên tránh điều nào dưới đây?", arr: ["Phân cấp thư mục rõ ràng theo năm học và học kỳ", "Tạo các thư mục con đồng nhất cho từng môn học", "Tạo quá nhiều cấp thư mục (sâu hơn 4-5 cấp) vì sẽ gây khó khăn khi điều hướng", "Đặt tên thư mục nhất quán và ngắn gọn"], ans: "C" },
            { ch: 2, c: 19, q: "Theo công thức gợi ý đặt tên tệp nhất quán: YYYY-MM-DD_[Mã môn học]_[Loại tài liệu]_[Nội dung chính]_[Phiên bản], thành phần ngày tháng được định dạng như vậy nhằm mục đích gì?", arr: ["Để hệ thống bảo mật tệp tin tốt hơn", "Giúp các tệp tin tự động sắp xếp theo thứ tự thời gian tăng/giảm dần", "Giảm dung lượng lưu trữ của tệp tin trên ổ đĩa", "Tránh việc người khác chỉnh sửa nội dung tệp"], ans: "B" },
            { ch: 2, c: 20, q: "Lưu ý quan trọng khi đặt tên tệp tin để tránh lỗi hiển thị trên một số hệ thống quản lý lưu trữ mạng là gì?", arr: ["Sử dụng dấu cách giữa các từ trong tên tệp", "Sử dụng dấu gạch dưới hoặc gạch nối '-' thay vì dấu cách", "Đặt tên tệp càng dài càng tốt", "Viết tên tệp hoàn toàn bằng tiếng Việt có dấu và ký tự đặc biệt"], ans: "B" },
            { ch: 2, c: 21, q: "Ứng dụng ghi chú số nào dưới đây nổi tiếng với việc cung cấp một không gian làm việc \"tất cả trong một\", cực kỳ linh hoạt, hỗ trợ quản lý công việc và xây dựng cơ sở dữ liệu cá nhân?", arr: ["Microsoft OneDrive", "Google Keep", "Notion", "Zotero"], ans: "C" },
            { ch: 2, c: 22, q: "Lợi ích cốt lõi nhất của các phần mềm quản lý tài liệu tham khảo như Zotero hay Mendeley đối với sinh viên khi làm tiểu luận là gì?", arr: ["Hỗ trợ thiết kế slide trình chiếu đồ họa đẹp mắt", "Lưu trữ bài giảng video đồng bộ thời gian thực", "Thu thập tài liệu và tự động chèn trích dẫn, tạo danh mục nguồn theo chuẩn quốc tế chính xác", "Kiểm tra và sửa lỗi chính tả tự động trên văn bản Word"], ans: "C" },
            { ch: 2, c: 23, q: "Tài khoản sinh viên do trường cấp khi sử dụng dịch vụ lưu trữ đám mây Microsoft OneDrive thường được hỗ trợ dung lượng lưu trữ tối đa lên tới bao nhiêu?", arr: ["15 GB", "5 GB", "100 GB", "1 TB"], ans: "D" },
            { ch: 2, c: 24, q: "In quy tắc sao lưu dữ liệu vàng \"3-2-1\", con số \"3\" đại diện cho yêu cầu nào dưới đây?", arr: ["Phải sao lưu dữ liệu ít nhất 3 lần mỗi ngày", "Luôn có ít nhất 3 bản sao của các dữ liệu quan trọng", "Lưu trữ dữ liệu trên 3 loại thiết bị phần cứng giống nhau", "Phải chia sẻ dữ liệu cho ít nhất 3 người khác nhau để giữ hộ"], ans: "B" },
            { ch: 2, c: 25, q: "Quy tắc sao lưu \"3-2-1\" yêu cầu giữ ít nhất 1 bản sao ở một địa điểm khác (off-site), giải pháp hoàn hảo nhất hiện nay cho yêu cầu này là gì?", arr: ["Lưu vào một thư mục khác trên chính ổ cứng laptop", "Sao chép vào một USB khác và cất trong cặp sách đi học", "Lưu trữ bản sao trên các dịch vụ đám mây (Cloud Storage)", "In toàn bộ dữ liệu ra giấy"], ans: "C" },
            { ch: 2, c: 26, q: "Tính năng \"Lịch sử phiên bản\" (Version History) của các dịch vụ đám mây hỗ trợ người dùng giải quyết tình huống rủi ro nào?", arr: ["Máy tính bị nhiễm phần mềm độc hại tống tiền", "Quên mật khẩu đăng nhập vào tài khoản hệ thống", "Hỗ trợ quay lại các phiên bản cũ hơn của một tệp khi vô tình xóa nhầm hoặc lưu đè nội dung", "Tự động phát hiện lỗi chính tả văn bản"], ans: "C" },
            { ch: 2, c: 27, q: "Tiêu chuẩn nào dưới đây được khuyến nghị để thiết lập một mật khẩu mạnh giúp bảo vệ an toàn dữ liệu tài khoản?", arr: ["Sử dụng ngày tháng năm sinh hoặc số điện thoại cá nhân", "Độ dài tối thiểu 6 ký tự, chỉ cần viết hoa chữ cái đầu tiên", "Sử dụng mật khẩu dài (trên 12 ký tự), kết hợp chữ hoa, chữ thường, số và ký tự đặc biệt", "Dùng chung một mật khẩu dễ nhớ cho tất cả các tài khoản mạng xã hội và ngân hàng"], ans: "C" },
            { ch: 2, c: 28, q: "Phương thức bảo vệ tài khoản bằng cách yêu cầu nhập một mã xác minh thứ hai (thường gửi đến điện thoại) ngoài mật khẩu thông thường được gọi là gì?", arr: ["Xác thực hai yếu tố (2FA - Two-Factor Authentication)", "Đăng nhập một lần (SSO)", "Quét mã bảo mật QR", "Hệ thống định vị dữ liệu toàn cầu"], ans: "A" },
            { ch: 2, c: 29, q: "Hành vi lừa đảo bằng cách gửi các liên kết giả mạo đáng ngờ qua email hoặc tin nhắn nhằm thao túng người dùng nhập thông tin nhạy cảm được gọi là gì?", arr: ["Bản quyền (Copyright)", "Đạo văn (Plagiarism)", "Lừa đảo trực tuyến (Phishing)", "Giao tiếp trường gần (NFC)"], ans: "C" },
            { ch: 2, c: 30, q: "Khi tìm kiếm thông tin trên Google, để tìm kiếm chính xác một cụm từ cụ thể mà không muốn các từ trong cụm từ bị tách rời, ta dùng toán tử nào?", arr: ["Đặt cụm từ trong dấu ngoặc kép \"...\"", "Sử dụng dấu trừ '-' trước cụm từ", "Sử dụng toán tử viết hoa OR", "Thêm cú pháp site: vào trước từ khóa"], ans: "A" },
            { ch: 2, c: 31, q: "Toán tử tìm kiếm nâng cao nào trên Google giúp giới hạn kết quả tìm kiếm chỉ xuất hiện trong một trang web hoặc một tên miền cụ thể?", arr: ["related:", "site:", "filetype:", "AROUND(n)"], ans: "B" },
            { ch: 2, c: 32, q: "Khi sử dụng công cụ tìm kiếm học thuật Google Scholar, tính năng nào giúp người đọc đánh giá nhanh chóng mức độ ảnh hưởng và chất lượng của một bài báo khoa học?", arr: ["Tính năng \"Related articles\" (Bài viết liên quan)", "Chỉ số số lần được trích dẫn (\"Cited by\")", "Biểu tượng dấu ngoặc kép lấy trích dẫn nhanh", "Tính năng lưu vào thư viện cá nhân \"My library\""], ans: "B" },
            { ch: 2, c: 33, q: "Địa chỉ kho thư viện số lưu trữ các tài liệu nội sinh (luận án, luận văn, đề tài nghiên cứu khoa học) của Đại học Quốc gia Hà Nội là gì?", arr: ["bookworm.lic.vnu.edu.vn", "lic.vnu.edu.vn", "repository.vnu.edu.vn", "vnu.edu.vn"], ans: "C" },
            { ch: 2, c: 34, q: "Công cụ AI chuyên dụng nào hỗ trợ lược khảo tài liệu bằng cách tìm kiếm các bài báo liên quan và tự động tóm tắt các kết luận chính của chúng thành một bảng so sánh?", arr: ["ChatGPT", "SciSpace", "QuillBot", "Elicit"], ans: "D" },
            { ch: 2, c: 35, q: "Theo Luật Sở hữu trí tuệ của Việt Nam, quyền tác giả đối với các tác phẩm khoa học, văn học được bảo hộ theo nguyên tắc nào?", arr: ["Bắt buộc phải đăng ký bản quyền tại cơ quan nhà nước mới được bảo hộ", "Được bảo hộ tự động ngay từ khi tác phẩm được sáng tạo và thể hiện dưới một hình thức vật chất nhất định", "Chỉ được bảo hộ sau khi đã xuất bản công khai trên Internet", "Chỉ bảo hộ cho các tác phẩm của những tác giả có bằng tiến sĩ trở lên"], ans: "B" },
            { ch: 2, c: 36, q: "Để tìm kiếm chính xác các tài liệu hướng dẫn định dạng pdf về chủ đề \"biến đổi khí hậu\" chỉ nằm trên các trang web thuộc cơ quan chính phủ Việt Nam (.gov), sinh viên nên gõ cú pháp nào trên Google là đúng quy cách nhất?", arr: ["biến đổi khí hậu pdf government", "\"biến đổi khí hậu\" filetype:pdf site:gov", "filetype:pdf site:.edu.vn \"biến đổi khí hậu\"", "biến đổi khí hậu -pdf site:gov"], ans: "B" },
            { ch: 2, c: 37, q: "Một sinh viên cần kiểm tra mức độ đáng tin cậy của một bài viết trên mạng xã hội có tiêu đề mang tính giật gân, cường điệu và hoàn toàn không ghi rõ thông tin tác giả hay nguồn gốc số liệu. Theo bộ tiêu chí CRAAP, sinh viên này cần đặc biệt ưu tiên thẩm định kỹ hai yếu tố cốt lõi nào đầu tiên?", arr: ["Tính cập nhật (Currency) và Tính chính xác (Accuracy): kiểm tra lỗi chính tả của bài viết.", "Tính Thẩm quyền (Authority) và Mục đích (Purpose): xác định rõ danh tính, uy tín của tác giả và mục tiêu cốt lõi của bài viết.", "Sự liên quan (Relevance) và Tính cập nhật (Currency): kiểm tra bài viết có đăng trong 6 tháng gần đây không.", "Tính chính xác (Accuracy) và Sự liên quan (Relevance): đảm bảo tiêu đề bài viết khớp hoàn toàn với nội dung."], ans: "B" },
            { ch: 2, c: 38, q: "Trong lúc nghiên cứu tài liệu cho một bài tập lớn môn Y học, sinh viên tìm thấy một bài viết học thuật có nội dung trình bày rất chuyên nghiệp trên một trang web thương mại tên miền .com. Tuy nhiên, phần thông tin \"Tác giả\" của bài viết chỉ ghi chung chung là \"Ban biên tập\" mà không nêu tên chuyên gia cụ thể hay trình độ chuyên môn của họ. Áp dụng tiêu chí Authority (Thẩm quyền) trong mô hình CRAAP, độ tin cậy của nguồn này nên được đánh giá như thế nào?", arr: ["Đáng tin cậy cao, vì giao diện trang web trông rất chuyên nghiệp và tên miền com vô cùng phổ biến.", "Đáng tin cậy cao, vì cụm từ \"Ban biên tập\" chứng minh bài viết đã qua nhiều người kiểm duyệt nội dung.", "Độ tin cậy thấp, vì không xác định rõ được danh tính cụ thể và năng lực chuyên môn của người chịu trách nhiệm nội dung.", "Rất đáng tin cậy nếu bài viết này vô tình đứng ở trang đầu tiên trong danh sách kết quả tìm kiếm của Google."], ans: "C" },
            { ch: 2, c: 39, q: "Sinh viên thực hiện tìm kiếm tài liệu về chủ đề trí tuệ nhân tạo trên thanh công cụ tìm kiếm của Google, nhưng muốn loại bỏ hoàn toàn các bài viết liên quan đến phần mềm \"ChatGPT\". Cú pháp tìm kiếm nào dưới đây được viết đúng quy tắc?", arr: ["trí tuệ nhân tạo AND ChatGPT", "trí tuệ nhân tạo -ChatGPT", "'trí tuệ nhân tạo' & 'ChatGPT'", "trí tuệ nhân tạo OR ChatGPT"], ans: "B" },
            { ch: 2, c: 40, q: "Bạn đang viết một bài báo cáo khoa học và có sử dụng một biểu đồ số liệu thống kê được chụp lại từ một cuốn sách của tác giả khác. Bạn có liệt kê tên cuốn sách đó ở Danh mục tài liệu tham khảo cuối bài, nhưng lại không hề ghi chú thích nguồn ngay dưới biểu đồ này. Hành vi này được xem là gì?", arr: ["Hoàn toàn đúng quy cách và không cần thiết phải ghi chú thích dưới ảnh.", "Được chấp nhận vì đã có tên sách ở danh mục tài liệu tham khảo cuối bài.", "Thiếu liêm chính học thuật (hoặc đạo văn một phần) do không ghi nhận nguồn trực tiếp cho tài liệu không phải định dạng văn bản.", "Vi phạm nghiêm trọng hình sự về quyền tác giả."], ans: "C" },
            { ch: 2, c: 41, q: "Sinh viên C đang làm bài nghiên cứu về chủ đề \"năng lượng tái tạo\" và muốn tìm các tài liệu báo cáo dưới dạng tệp slide thuyết trình PowerPoint (.pptx) trên Internet, đồng thời muốn loại bỏ hoàn toàn các bài viết chứa từ khóa \"than đá\". Cú pháp tìm kiếm nào trên Google giúp C tối ưu hóa chính xác yêu cầu này?", arr: ["năng lượng tái tạo AND PPTX -than đá", "\"năng lượng tái tạo\" filetype:pptx -than đá", "site:pptx \"năng lượng tái tạo\" NOT than đá", "filetype:pdf \"năng lượng tái tạo\" +than đá"], ans: "B" },
            { ch: 2, c: 42, q: "Sinh viên D tìm thấy một bài báo khoa học rất giá trị về ngành \"Công nghệ thực phẩm\" trên Google Scholar được xuất bản từ năm 2020. D muốn tìm thêm các nghiên cứu mới hơn (xuất bản sau năm 2020) đã kế thừa, trích dẫn và sử dụng kết quả của bài báo này để phát triển chuyên sâu. D nên bấm vào tính năng nào trực tiếp dưới bài báo đó để tìm kiếm nhanh nhất?", arr: ["Biểu tượng dấu ngoặc kép \" \" (Trích dẫn nhanh)", "Chỉ số số lần được trích dẫn (\"Cited by\")", "Tính năng \"Related articles\" (Bài viết liên quan)", "Tính năng \"Save\" (Lưu vào thư viện của tôi)"], ans: "B" },
            { ch: 2, c: 43, q: "Sinh viên E có một tệp tài liệu nghiên cứu chuyên ngành bằng tiếng Anh định dạng PDF dài hơn 50 trang với rất nhiều thuật ngữ học thuật phức tạp. E muốn sử dụng một công cụ AI để có thể tải trực tiếp tệp này lên, sau đó \"trò chuyện\" (chat) với tài liệu để yêu cầu giải thích các thuật ngữ hoặc tóm tắt nhanh từng phần. Công cụ AI chuyên dụng nào dưới đây đáp ứng tốt nhất yêu cầu này?", arr: ["QuillBot", "Elicit", "Semantic Scholar", "SciSpace (scispace.com)"], ans: "D" },
            { ch: 2, c: 44, q: "Để phục vụ cho bài tiểu luận môn Nhập môn Công nghệ số, bạn muốn tìm kiếm các văn bản quy định về đề tài \"nghiên cứu khoa học sinh viên\" nhưng chỉ muốn kết quả trả về xuất hiện từ trang web chính thức của Đại học Quốc gia Hà Nội (vnu.edu.vn). Cú pháp tìm kiếm nâng cao nào trên Google sẽ mang lại kết quả chuẩn xác nhất?", arr: ["\"nghiên cứu khoa học sinh viên\" site:vnu.edu.vn", "nghiên cứu khoa học sinh viên vnu.edu.vn", "site:edu.vn \"nghiên cứu khoa học sinh viên\"", "\"nghiên cứu khoa học sinh viên\" +vnu"], ans: "A" },
            { ch: 2, c: 45, q: "Sinh viên F sử dụng chatbot AI để hỗ trợ làm bài thảo luận nhóm. Chatbot đã tạo ra một đoạn văn bản tóm tắt rất mượt mà về \"xu hướng chuyển đổi số\". Hành vi nào dưới đây của F thể hiện việc khai thác công cụ AI một cách có trách nhiệm và tuân thủ đúng quy định về đạo đức học thuật?", arr: ["Sao chép nguyên văn đoạn văn bản đó vào slide của nhóm và ký tên mình là tác giả.", "Thay đổi một vài từ đồng nghĩa trong đoạn văn của AI rồi nộp bài để tránh bị các phần mềm phát hiện.", "Sử dụng đoạn văn bản đó làm tư liệu gợi ý, chủ động kiểm tra chéo tính xác thực của thông tin/số liệu từ các nguồn uy tín, và tự viết lại bằng ngôn từ của mình.", "Sử dụng toàn bộ các số liệu do AI cung cấp vào bài báo cáo mà không cần tra cứu lại vì tin rằng AI luôn chính xác."], ans: "C" },// === CHƯƠNG 3: TRÍ TUỆ NHÂN TẠO (AI) (CÂU 1 - 55) ===
            { ch: 3, c: 1, q: "Sự kiện nào vào năm 1956 được coi là mốc khai sinh chính thức của lĩnh vực Trí tuệ nhân tạo (AI) như một ngành nghiên cứu khoa học?", arr: ["Phép thử Turing (Turing Test).", "Chiến thắng của Deep Blue trước Garry Kasparov.", "Hội nghị Dartmouth.", "Phát minh ra kiến trúc Transformer."], ans: "C" },
            { ch: 3, c: 2, q: "Đâu là điểm khác biệt cốt lõi về chức năng giữa AI phân biệt (Discriminative AI) và AI tạo sinh (Generative AI) là gì?", arr: ["AI phân biệt chuyên về mô hình ngôn ngữ lớn (LLM), còn AI tạo sinh sử dụng mạng nơ-ron tích chập (CNN).", "AI phân biệt có khả năng tạo ra dữ liệu mới, còn AI tạo sinh chỉ thực hiện nhiệm vụ phân loại.", "AI phân biệt tập trung vào phân loại/dự đoán nhãn, còn AI tạo sinh tập trung vào tạo ra nội dung mới.", "AI tạo sinh không yêu cầu dữ liệu huấn luyện, trong khi AI phân biệt thì có."], ans: "C" },
            { ch: 3, c: 3, q: "Nguyên lý hoạt động cốt lõi của các Mô hình ngôn ngữ lớn (LLMs) như GPT trong việc tạo văn bản là gì?", arr: ["Mô phỏng chính xác cấu trúc và khả năng cảm xúc của bộ não con người.", "Dự đoán từ/token tiếp theo có xác suất xuất hiện cao nhất dựa trên ngữ cảnh đầu vào.", "Sao chép và tổ chức lại các đoạn văn bản chính xác từ cơ sở dữ liệu huấn luyện.", "Sử dụng một bộ quy tắc ngữ pháp cố định được lập trình một cách tường minh."], ans: "B" },
            { ch: 3, c: 4, q: "Đâu là lợi ích chính của việc sử dụng AI trong việc phát triển năng lực số cá nhân của sinh viên?", arr: ["Tập trung vào việc mô phỏng trí tuệ con người và tự động hóa các quyết định cá nhân.", "Hạn chế việc tìm kiếm thông tin bằng tay và duy trì các công việc tư duy lặp đi lặp lại.", "Tăng cường hiệu suất tìm kiếm, tổng hợp tri thức và cá nhân hóa quá trình học tập.", "Giúp sinh viên tự động hoàn thành các hoạt động học tập và các bài kiểm tra đánh giá."], ans: "C" },
            { ch: 3, c: 5, q: "Khi bạn cung cấp cho AI một vài ví dụ cụ thể về định dạng đầu ra mong muốn (ví dụ: Câu hỏi -> Trả lời mẫu) trong câu lệnh prompt, bạn đang sử dụng kỹ thuật nào?", arr: ["Zero-shot Prompting", "Few-shot Prompting", "Random Prompting", "Implicit Prompting"], ans: "B" },
            { ch: 3, c: 6, q: "Sinh viên cần sử dụng Gemini để tóm tắt một bài báo khoa học dài về 'Tác động của Biến đổi Khí hậu' cho bài thuyết trình nhóm. Để áp dụng yếu tố 'Context' hiệu quả, sinh viên nên cung cấp thông tin nào sau đây?", arr: ["Cung cấp nội dung cốt lõi của bài báo gốc và chỉ rõ mục tiêu sử dụng nội dung.", "Yêu cầu AI đảm nhận một vai trò như chuyên gia khí hậu học nổi tiếng.", "Chỉ định rằng đầu ra phải có định dạng bảng với các luận điểm không quá 50 từ.", "Yêu cầu AI phân tích phản biện đối với phương pháp nghiên cứu được sử dụng trong bài báo."], ans: "A" },
            { ch: 3, c: 7, q: "Nếu bạn cần tìm kiếm thông tin học thuật chính xác kèm theo trích dẫn nguồn gốc rõ ràng để phục vụ nghiên cứu, công cụ AI nào sau đây (được ví như 'cỗ máy trả lời') là phù hợp nhất?", arr: ["ChatGPT", "DALL-E 3", "Midjourney", "Perplexity AI"], ans: "D" },
            { ch: 3, c: 8, q: "Nguyên lý nhân cốt lõi dẫn đến 'Mùa đông AI' lần thứ hai và sự thất bại của Hệ chuyên gia (Expert Systems) là gì?", arr: ["Phương pháp Học máy không thể xử lý dữ liệu phi cấu trúc.", "Phương pháp cố gắng mã hóa tường minh các quy tắc logic và kiến thức chuyên gia (Rule-based systems).", "Phương pháp Học sâu yêu cầu quá nhiều dữ liệu.", "Phương pháp sử dụng Mạng nơ-ron nhân tạo quá phức tạp."], ans: "B" },
            { ch: 3, c: 9, q: "Khái niệm nào sau đây chỉ một nhánh con của Trí tuệ nhân tạo, tập trung vào việc phát triển các thuật toán cho phép máy tính tự 'học' các mẫu và quy luật từ dữ liệu mà không cần lập trình tường minh?", arr: ["Mạng nơ-ron nhân tạo (ANN)", "Trí tuệ nhân tạo tạo sinh (GenAI)", "Học máy (Machine Learning)", "Học sâu (Deep Learning)"], ans: "C" },
            { ch: 3, c: 10, q: "Việc sử dụng các công cụ AI tạo sinh để hỗ trợ soạn thảo email chuyên nghiệp, hoặc phân tích cảm xúc trong giao tiếp thuộc thành phần năng lực số nào?", arr: ["An toàn và an sinh số", "Giao tiếp và hợp tác", "Khai thác thông tin và dữ liệu", "Sáng tạo nội dung số"], ans: "B" },
            { ch: 3, c: 11, q: "Khi muốn AI chuyển đổi một đoạn văn xuôi thành một đoạn thơ, việc yêu cầu AI 'Hãy đóng vai một nhà thơ lãng mạn Việt Nam' là nhằm mục đích vận dụng yếu tố nào của Prompt Engineering?", arr: ["Context (Bối cảnh)", "Role (Vai trò)", "Audience (Đối tượng)", "Explicit Instruction (Chỉ dẫn rõ ràng)"], ans: "B" },
            { ch: 3, c: 12, q: "Giả sử bạn muốn AI đưa ra 5 ý tưởng quảng cáo sáng tạo cho một sản phẩm mới, nhưng bạn muốn các ý tưởng đó phải được trình bày theo định dạng bảng (table). Kỹ thuật prompt nào sau đây kiểm soát định dạng đầu ra hiệu quả nhất?", arr: ["Iterative Prompting nhiều lượt.", "Zero-shot Prompting với chỉ dẫn rõ ràng.", "Few-shot Prompting với ví dụ mẫu là bảng.", "Chain-of-Thought Prompting."], ans: "C" },
            { ch: 3, c: 13, q: "Bạn muốn AI lên dàn ý cho một bài báo cáo về 'Tiềm năng của Công nghệ Blockchain'. Prompt hiệu quả nhất cần đảm bảo yếu tố nào?", arr: ["Yêu cầu mô hình sử dụng phong cách viết tin tức, báo chí.", "Yêu cầu mô hình viết toàn bộ nội dung của phần mở đầu.", "Chỉ yêu cầu mô hình giải thích định nghĩa của Blockchain.", "Xác định rõ ràng số lượng và nội dung các phần cần có trong dàn ý (ví dụ: mở đầu, 3 phần thân bài, kết luận)."], ans: "D" },
            { ch: 3, c: 14, q: "Giả sử bạn cần tóm tắt một bài báo chuyên ngành phức tạp, dành cho một người không có chuyên môn. Hành động (Action) quan trọng nhất mà bạn cần đưa vào prompt là gì?", arr: ["Yêu cầu AI chỉ tóm tắt thành 2 đoạn văn.", "Yêu cầu AI diễn giải lại bằng một phép ẩn dụ đơn giản.", "Yêu cầu AI liệt kê các tác giả của bài báo.", "Yêu cầu AI giữ lại tất cả các thuật ngữ chuyên môn."], ans: "B" },
            { ch: 3, c: 15, q: "Kỹ thuật prompt nào là cách đơn giản nhất, trong đó người dùng chỉ đưa ra yêu cầu trực tiếp mà KHÔNG kèm theo bất kỳ ví dụ nào về đầu vào và đầu ra mong muốn?", arr: ["Iterative Prompting", "Chain-of-Thought Prompting", "Zero-shot Prompting", "Few-shot Prompting"], ans: "C" },
            { ch: 3, c: 16, q: "Rủi ro 'ảo giác' (hallucination) của Mô hình Ngôn ngữ Lớn (LLM) được phân tích là do nguyên nhân cốt lõi nào?", arr: ["LLM bị lập trình sai lỗi thuật toán trong quá trình tạo sinh.", "LLM không có khả năng truy cập Internet để kiểm chứng thông tin.", "LLM bị giới hạn bởi độ dài của prompt đầu vào.", "LLM tạo ra chuỗi từ có vẻ hợp lý nhất về mặt xác suất thống kê dựa trên dữ liệu đã học, không có khả năng 'biết' sự thật."], ans: "D" },
            { ch: 3, c: 17, q: "Sinh viên cần một prompt để tổng hợp ý chính từ 3 tài liệu khác nhau về chủ đề 'Biến đổi khí hậu'. Phần nào thể hiện yếu tố 'Context' rõ ràng nhất trong trường hợp này?", arr: ["Tôi đang làm tiểu luận về biến đổi khí hậu và cần tổng hợp nội dung từ 3 tài liệu.", "Phân tích nội dung và đưa ra 3 luận điểm chính về chủ đề biến đổi khí hậu.", "Tôi cần nội dung này cho bài tiểu luận cuối kỳ.", "Hãy tổng hợp các ý chính để xây dựng bài tiểu luận về biến đổi khí hậu."], ans: "A" },
            { ch: 3, c: 18, q: "Phép thử Turing (Turing Test) do Alan Turing đề xuất vào năm 1950 xoay quanh câu hỏi nền tảng nào?", arr: ["'Máy móc có thể có cảm xúc không?'", "'Máy móc có thể tự lập trình không?'", "'Máy móc có thể suy nghĩ không?'", "'Máy móc có thể thay thế con người không?'"], ans: "C" },
            { ch: 3, c: 19, q: "Cuộc cách mạng Học máy và Học sâu từ cuối thập niên 1990 được thúc đẩy bởi 3 yếu tố then chốt nào?", arr: ["Dữ liệu lớn (Big Data), Sức mạnh phần cứng (GPU), Đột phá thuật toán", "Hệ chuyên gia, Dữ liệu lớn, Mạng 5G", "Kiến trúc Transformer, Dữ liệu lớn, CPU đa nhân", "Máy tính lượng tử, Thuật toán di truyền, Big Data"], ans: "A" },
            { ch: 3, c: 20, q: "Sự kiện năm 2012 mở ra kỷ nguyên học sâu (Deep Learning) là gì?", arr: ["Chatbot ELIZA ra đời", "Mô hình AlexNet chiến thắng cuộc thi nhận dạng ảnh ImageNet", "AlphaGo đánh bại Lee Sedol", "ChatGPT ra mắt"], ans: "B" },
            { ch: 3, c: 21, q: "Theo tài liệu, Trí tuệ nhân tạo hẹp (Narrow AI) có đặc điểm gì?", arr: ["Đạt trí thông minh tương đương con người ở mọi lĩnh vực", "Không cần sử dụng bất kỳ dữ liệu huấn luyện nào", "Tối ưu vượt trội cho một nhiệm vụ cụ thể nhưng không có tư duy tổng quát", "Có thể tự ý thức và suy nghĩ độc lập"], ans: "C" },
            { ch: 3, c: 22, q: "Đặc điểm nổi bật của Học sâu (Deep Learning) so với Học máy (Machine Learning) cơ bản là gì?", arr: ["Utilizing explicit if-else logic rules.", "Không cần sử dụng Mạng nơ-ron nhân tạo", "Chỉ cần một lượng dữ liệu rất nhỏ để hoạt động", "Sử dụng mạng nơ-ron nhiều lớp ẩn để tự động trích xuất đặc trưng từ dữ liệu phi cấu trúc"], ans: "D" },
            { ch: 3, c: 23, q: "Bước 'Dự đoán' (Prediction) trong nguyên lý hoạt động của Mô hình ngôn ngữ lớn (LLMs) thực hiện việc gì?", arr: ["Chọn từ ngẫu nhiên trong từ điển", "Tính toán xác suất để tìm từ tiếp theo phù hợp nhất trong kho từ vựng", "Đọc lại toàn bộ nội dung từ Internet", "Dịch văn bản sang ngôn ngữ khác"], ans: "B" },
            { ch: 3, c: 24, q: "Kiến trúc nào ra đời năm 2017 đã mở đường cho các Mô hình Ngôn ngữ Lớn (LLMs) bùng nổ?", arr: ["Mạng nơ-ron tích chập (CNN)", "Kiến trúc Transformer", "Hệ chuyên gia (Expert Systems)", "Mạng nơ-ron hồi quy (RNN)"], ans: "B" },
            { ch: 3, c: 25, q: "Việc AI đặt ra thách thức lớn về tư duy phản biện trước các hình ảnh/video giả mạo tinh vi (deepfake) thuộc về thành phần năng lực số nào?", arr: ["Giao tiếp & hợp tác", "Sáng tạo nội dung số", "An toàn & an sinh số", "Khai thác thông tin & dữ liệu"], ans: "C" },
            { ch: 3, c: 26, q: "Tính năng mạnh mẽ nhất của Gemini trong Google Workspace được tài liệu nhắc đến là gì?", arr: ["Tự động trả lời mọi email bằng giọng văn của người dùng", "Thay thế hoàn toàn người dùng trong việc tạo bảng tính phức tạp", "Tham chiếu tệp khác (ví dụ: lấy thông tin từ Google Drive để tóm tắt)", "Tự động thiết kế website bán hàng"], ans: "C" },
            { ch: 3, c: 27, q: "AI đóng vai trò 'Gia sư cá nhân hóa 24/7' bằng cách nào?", arr: ["Phân tích điểm mạnh yếu của sinh viên để đưa ra câu hỏi ôn tập và giải thích khái niệm", "Làm hộ bài tập về nhà cho sinh viên", "Tự động điểm danh sinh viên trên lớp", "Soạn thảo email xin nghỉ học chuyên nghiệp"], ans: "A" },
            { ch: 3, c: 28, q: "Trong các thách thức của AI, khái niệm 'Khoảng cách số' (Digital Divide) ám chỉ điều gì?", arr: ["Sự chênh lệch tốc độ mạng giữa các quốc gia", "Bất bình đẳng giữa sinh viên có và không có điều kiện tiếp cận các phiên bản AI trả phí mạnh nhất", "Khoảng cách thời gian AI phản hồi câu lệnh", "Ranh giới mong manh giữa gian lận và hỗ trợ học tập"], ans: "B" },
            { ch: 3, c: 29, q: "In mô hình viết prompt CLEAR, chữ 'E' (Explicit Instruction) yêu cầu người dùng phải làm gì?", arr: ["Định hình văn phong của câu trả lời", "Cung cấp thông tin nền liên quan", "Tiếp tục yêu cầu AI sửa đổi kết quả", "Nêu cụ thể yêu cầu về hành động, định dạng, số lượng"], ans: "D" },
            { ch: 3, c: 30, q: "Khi gặp lỗi 'Prompt quá chung chung', tài liệu khuyên cách khắc phục nào?", arr: ["Xóa prompt và dùng công cụ AI khác", "Viết ngắn gọn lại để AI không bị nhiễu", "Bổ sung từ khóa chiến lược và mục tiêu cụ thể", "Yêu cầu AI tự tìm kiếm trên Internet"], ans: "C" },
            { ch: 3, c: 31, q: "Để khắc phục lỗi 'Yêu cầu quá phức tạp trong một lượt', người dùng nên làm gì?", arr: ["Chuyển sang mô hình AI trả phí", "Cung cấp thêm ví dụ bằng hình ảnh", "Chia nhỏ thành chuỗi các prompt liên tiếp (lập dàn ý, viết từng phần, kết luận)", "Yêu cầu AI 'suy nghĩ từng bước một'"], ans: "C" },
            { ch: 3, c: 32, q: "Trong Microsoft Teams, Copilot có thể thực hiện tác vụ tự động hóa nào hữu ích nhất?", arr: ["Tự động bật camera và microphone khi đến giờ", "Tạo bài thuyết trình PowerPoint từ video", "Tóm tắt cuộc họp, liệt kê quyết định và người chịu trách nhiệm", "Chặn các tin nhắn rác trong cuộc gọi"], ans: "C" },
            { ch: 3, c: 33, q: "Điểm mạnh độc nhất của công cụ Grok (xAI) là gì?", arr: ["Tích hợp sâu vào Google Workspace", "Tích hợp dữ liệu thời gian thực từ mạng xã hội X (Twitter)", "Luôn kèm theo trích dẫn học thuật uy tín", "Tạo ra hình ảnh chất lượng cao nhất hiện nay"], ans: "B" },
            { ch: 3, c: 34, q: "Công cụ Meta AI có thế mạnh đặc biệt trong lĩnh vực nào?", arr: ["Phân tích dữ liệu tài chính", "Kiểm chứng thông tin khoa học", "Sáng tạo hình ảnh và tương tác xã hội (tích hợp trên Facebook, Instagram)", "Soạn thảo mã lập trình phức tạp"], ans: "C" },
            { ch: 3, c: 35, q: "Hạn chế/Điểm yếu của ChatGPT phiên bản miễn phí (GPT-3.5) là gì?", arr: ["Không thể tạo văn bản tiếng Việt", "Yêu cầu cấu hình máy tính rất cao", "Không thể đối thoại nhiều lượt", "Kiến thức bị giới hạn bởi ngày cắt dữ liệu và có thể sinh ra 'ảo giác'"], ans: "D" },
            { ch: 3, c: 36, q: "Hành vi nộp bài luận do AI viết hoàn toàn vi phạm khía cạnh nào trong giáo dục?", arr: ["An toàn thông tin", "Khoảng cách số", "Liêm chính học thuật", "Quyền sở hữu trí tuệ của AI"], ans: "C" },
            { ch: 3, c: 37, q: "AI tổng quát (AGI) được định nghĩa là gì trong tài liệu?", arr: ["AI tối ưu cho một nhiệm vụ cụ thể như Siri", "AI giả định đạt trí thông minh tương đương hoặc vượt qua con người ở mọi lĩnh vực", "Một nhánh của Học máy chuyên xử lý ảnh", "Các hệ thống dựa hoàn toàn trên luật (Rule-based)"], ans: "B" },
            { ch: 3, c: 38, q: "Trong phần 'Thách thức', rủi ro 'Thiên vị (Bias)' của AI xuất phát từ đâu?", arr: ["Do AI tự sinh ra cảm xúc ghét bỏ con người", "Do AI học từ dữ liệu do con người tạo ra nên kế thừa và khuếch đại các định kiến", "Do phần cứng máy tính bị lỗi", "Do AI không có quyền truy cập Internet"], ans: "B" },
            { ch: 3, c: 39, q: "Để mở rộng tư duy bản thân, lời khuyên cốt lõi khi sử dụng AI cho sinh viên là gì?", arr: ["Xem AI là cỗ máy trả lời toàn năng và giao mọi việc cho nó", "Chủ động xem AI là một trợ lý thông minh và luôn là người cầm lái", "Từ chối sử dụng AI để tránh bị 'ảo giác'", "Chỉ dùng AI để giải trí, không dùng cho học tập"], ans: "B" },
            { ch: 3, c: 40, q: "Kỹ thuật 'Iterative Prompting' (Prompt nhiều lượt) có nghĩa là gì?", arr: ["Trò chuyện, tinh chỉnh, sửa đổi câu trả lời qua nhiều bước liên tục", "Đưa ra một ví dụ duy nhất để AI bắt chước", "Giới hạn kết quả trả về dưới dạng bảng", "Yêu cầu AI 'suy nghĩ từng bước một'"], ans: "A" },
            { ch: 3, c: 41, q: "Theo lịch sử phát triển của AI, chatbot đầu tiên ra đời vào năm 1966 có tên là gì?", arr: ["Siri", "ELIZA", "Deep Blue", "AlphaGo"], ans: "B" },
            { ch: 3, c: 42, q: "Liệc Trí tuệ nhân tạo nào được ví như 'người giám định', tập trung vào việc học cách phân loại hoặc dự đoán nhãn dựa trên đầu vào?", arr: ["AI tạo sinh (GenAI)", "AI phân biệt (Discriminative AI)", "Học sâu (Deep Learning)", "Trí tuệ nhân tạo tổng quát (AGI)"], ans: "B" },
            { ch: 3, c: 43, q: "Khả năng của AI trong việc tự động tạo phụ đề và hỗ trợ dịch thuật thời gian thực giúp xóa bỏ rào cản ngôn ngữ thuộc về thành phần năng lực số nào?", arr: ["Sáng tạo nội dung số", "Vận hành thiết bị & phần mềm", "Khai thác thông tin & dữ liệu", "Giao tiếp & hợp tác"], ans: "D" },
            { ch: 3, c: 44, q: "Việc sử dụng AI để mô phỏng các tình huống thuyết trình hoặc phỏng vấn xin việc, qua đó nhận phản hồi tức thì về ngôn ngữ cơ thể, phản ánh vai trò nào của AI đối với người học?", arr: ["Đối tác sáng tạo (Creative Partner)", "Trợ lý nghiên cứu thông minh", "Môi trường thực hành an toàn", "Công cụ tự động hóa các tác vụ lặp lại"], ans: "C" },
            { ch: 3, c: 45, q: "Trong nguyên lý hoạt động 5 bước của Mô hình Ngôn ngữ Lớn (LLMs), bước nào chịu trách nhiệm phân tích ngữ cảnh của chuỗi từ do người dùng nhập vào?", arr: ["Huấn luyện (Training)", "Prompt (Câu lệnh đầu vào)", "Dự đoán (Prediction)", "Tạo sinh (Generation)"], ans: "B" },
            { ch: 3, c: 46, q: "Khi người dùng mắc lỗi 'Không cung cấp đủ ngữ cảnh' trong prompt, tài liệu đề xuất cách khắc phục nào sau đây?", arr: ["Khắc phục bằng cách yêu cầu AI tự tìm kiếm thêm thông tin trên mạng.", "Khắc phục bằng cách mô tả rõ vai trò, dung lượng, định dạng và đối tượng độc giả hướng tới.", "Khắc phục bằng cách chia nhỏ thành chuỗi các prompt liên tiếp.", "Khắc phục bằng cách bổ sung thêm ví dụ dưới dạng bảng (table)."], ans: "B" },
            { ch: 3, c: 47, q: "Chữ 'A' trong mô hình viết prompt CLEAR là viết tắt của từ gì?", arr: ["Action (Hành động)", "Analysis (Phân tích)", "Audience (Đối tượng)", "Accuracy (Độ chính xác)"], ans: "C" },
            { ch: 3, c: 48, q: "Công cụ AI nào sau đây được tích hợp sâu vào hệ sinh thái ứng dụng mạng xã hội (Facebook, Instagram) và có khả năng tạo hình ảnh chất lượng cao?", arr: ["Grok", "Perplexity AI", "ChatGPT", "Meta AI (Llama)"], ans: "D" },
            { ch: 3, c: 49, q: "Việc lười suy nghĩ và sao chép quá mức câu trả lời từ AI sẽ dẫn đến rủi ro nào cho người học?", arr: ["Bị đánh cắp quyền riêng tư dữ liệu", "Xói mòn kỹ năng tư duy phản biện, phân tích và viết lách", "Vi phạm bản quyền hình ảnh", "Mắc phải ảo giác (hallucination) của máy tính"], ans: "B" },
            { ch: 3, c: 50, q: "Kỹ thuật 'Chain-of-thought (CoT) Prompting' tỏ ra đặc biệt hiệu quả trong trường hợp nào?", arr: ["Khi cần AI bắt chước giọng điệu của một bài thơ.", "Khi cần AI định dạng kết quả dưới dạng tệp JSON.", "Khi giải quyết các bài toán logic, suy luận phức tạp.", "Khi cần AI tóm tắt nhanh một đoạn văn ngắn."], ans: "C" },
            { ch: 3, c: 51, q: "Một sinh viên ngành Công nghệ Thực phẩm cần phân tích ưu nhược điểm của các chất bảo quản. Thay vì hỏi chung chung, sinh viên này viết: 'Hãy đóng vai một chuyên gia hóa hữu cơ, giải thích cho một sinh viên năm nhất về cơ chế của chất bảo quản'. Sinh viên này đã vận dụng tốt yếu tố nào trong mô hình CLEAR?", arr: ["C (Bối cảnh) và E (Chỉ dẫn rõ ràng)", "L (Vai trò) và A (Đối tượng)", "C (Bối cảnh) và R (Tinh chỉnh)", "E (Chỉ dẫn rõ ràng) và R (Tinh chỉnh)"], ans: "B" },
            { ch: 3, c: 52, q: "Khi ôn tập môn Giải tích, bạn muốn AI hỗ trợ giải một bài toán tích phân để chép vào phần bài tập trong vở A4. Để AI không đưa ra đáp án cuối cùng ngay lập tức mà hiển thị rõ ràng từng bước tính toán nhằm mục đích đối chiếu phương pháp, bạn nên thêm cụm từ nào vào prompt?", arr: ["'Hãy trả về kết quả dưới dạng bảng.'", "'Hãy tóm tắt bài toán này thành 3 gạch đầu dòng.'", "'Hãy suy nghĩ từng bước một.'", "'Dựa vào những gì đã viết, hãy viết tiếp.'"], ans: "C" },
            { ch: 3, c: 53, q: "Nhóm của bạn đang thực hiện dự án thiết kế công cụ quản lý tài chính tự động cho tân sinh viên Đại học Bách Khoa. Các bạn cần họp nhóm trực tuyến và muốn có một bản tóm tắt tự động ghi lại các quyết định thiết kế cũng như người chịu trách nhiệm code từng module. Công cụ nào sau đây là lựa chọn phù hợp nhất theo tài liệu?", arr: ["Perplexity AI", "Grok", "Microsoft Copilot tích hợp trong Teams", "Tính năng tham chiếu tệp của Google Gemini"], ans: "C" },
            { ch: 3, c: 54, q: "Bạn đang soạn một bản CV trên Google Docs để ứng tuyển vị trí gia sư môn Vật lý. Bạn đã gõ xong phần giới thiệu và muốn AI tự động sinh thêm các gạch đầu dòng mô tả kinh nghiệm đi dạy dựa trên chính văn phong bạn đang viết dở. Tính năng nào của Google Gemini trong Workspace sẽ giúp bạn thực hiện điều này ngay tại tệp tài liệu?", arr: ["Tóm tắt tài liệu (Summarize document)", "Viết tiếp nội dung (Continue writing)", "Tham chiếu tệp khác (Reference other files)", "Soạn thảo email (Draft an email)"], ans: "B" },
            { ch: 3, c: 55, q: "Trong quá trình tìm kiếm tài liệu cơ sở lý thuyết cho môn Hóa vô cơ, bạn phát hiện một số phương trình phản ứng và trích dẫn bài báo khoa học do ChatGPT cung cấp trông rất logic nhưng thực chất không hề tồn tại trong thực tế. Hiện tượng này minh chứng cho rủi ro cụ thể nào của LLM?", arr: ["Khoảng cách số (Digital Divide)", "Thiên vị (Bias) về dữ liệu", "Hiện tượng Ảo giác (Hallucination)", "Vi phạm quyền riêng tư và bảo mật dữ liệu"], ans: "C" },

            // === CHƯƠNG 4: GIAO TIẾP VÀ CỘNG TÁC SỐ (CÂU 1 - 45) ===
            { ch: 4, c: 1, q: "Theo các tài liệu chuyên khảo, giao tiếp số (Digital Communication) được định nghĩa là quá trình trao đổi thông tin giữa các cá nhân, tổ chức thông qua:", arr: ["Các phương tiện truyền thông đại chúng như đài phát thanh và truyền hình mặt đất.", "Các nền tảng và công nghệ kỹ thuật số như email, mạng xã hội và các nền tảng trực tuyến.", "Các cuộc gặp gỡ trực tiếp có sự hỗ trợ của thiết bị trình chiếu cơ học.", "Hệ thống thư tín truyền thống được số hóa quy trình đóng gói."], ans: "B" },
            { ch: 4, c: 2, q: "Đặc điểm 'Vượt qua giới hạn không gian và thời gian' của giao tiếp số có ý nghĩa gì?", arr: ["Cho phép thông tin được bảo mật tuyệt đối không ai có thể xâm nhập.", "Cho phép kết nối và trao đổi thông tin mọi lúc, mọi nơi.", "Giúp thông tin tự động chuyển dịch về quá khứ để lưu trữ.", "Giới hạn quyền truy cập của người dùng theo múi giờ cố định."], ans: "B" },
            { ch: 4, c: 3, q: "Khi nói về đặc điểm của giao tiếp số, yếu tố nào giúp các cuộc trao đổi có thể được lưu lại, tìm kiếm và xem lại một cách dễ dàng?", arr: ["Đa dạng hình thức truyền tải.", "Khả năng lưu trữ và truy vết.", "Tính đồng bộ thời gian thực.", "Quy tắc ứng xử trên mạng."], ans: "B" },
            { ch: 4, c: 4, q: "Hình thức tương tác nào diễn ra trong thời gian thực, đòi hỏi tất cả các bên tham gia phải có mặt cùng một lúc?", arr: ["Giao tiếp bất đồng bộ (Asynchronous Communication).", "Giao tiếp đồng bộ (Synchronous Communication).", "Giao tiếp phi ngôn ngữ (Non-verbal Communication).", "Giao tiếp gián tiếp (Indirect Communication)."], ans: "B" },
            { ch: 4, c: 5, q: "Ứng dụng nào sau đây thuộc hình thức giao tiếp đồng bộ?", arr: ["Gửi một thư điện tử qua hệ thống Gmail.", "Để lại bình luận trên tài liệu trực tuyến Google Docs.", "Cuộc họp video trực tuyến qua các ứng dụng Zoom hoặc Google Meet.", "Đăng bài viết thảo luận trên các diễn đàn học thuật."], ans: "C" },
            { ch: 4, c: 6, q: "Yếu tố nào sau đây là ưu điểm cốt lõi của giao tiếp đồng bộ?", arr: ["Cung cấp sự linh hoạt tối đa về mặt thời gian cho người nhận.", "Tốc độ phản hồi tức thì và cho phép khai thác các yếu tố phi ngôn ngữ như giọng điệu, biểu cảm.", "Tạo ra một bản ghi văn bản rõ ràng, có nhiều thời gian suy nghĩ kỹ lưỡng trước khi trả lời.", "Không đòi hỏi sự sắp xếp và có mặt đồng thời của mọi người."], ans: "B" },
            { ch: 4, c: 7, q: "Hình thức tương tác không đòi hỏi sự có mặt đồng thời của các bên, người nhận có thể tiếp nhận, xử lý và phản hồi vào thời điểm thuận tiện cho họ được gọi là:", arr: ["Giao tiếp đồng bộ.", "Giao tiếp bất đồng bộ.", "Giao tiếp trực diện.", "Giao tiếp mô phỏng."], ans: "B" },
            { ch: 4, c: 8, q: "Nhược điểm lớn nhất của giao tiếp bất đồng bộ là gì?", arr: ["Đòi hỏi sự sắp xếp thời gian nghiêm ngặt và dễ gây gián đoạn công việc nếu không lên lịch.", "Chi phí vận hành và bản quyền phần mềm rất cao.", "Có độ trễ trong giao tiếp và dễ gây nguy cơ hiểu lầm nếu thông điệp không được diễn đạt cẩn thận.", "Giới hạn số lượng người tham gia tương tác trong cùng một thời điểm."], ans: "C" },
            { ch: 4, c: 9, q: "Theo Bảng 4.1, khi một sinh viên cần gửi thông báo chính thức cho giảng viên về việc xin nghỉ học, phương thức phù hợp nhất là:", arr: ["Gọi điện thoại đột xuất vào giờ nghỉ của giảng viên.", "Gửi tin nhắn qua các ứng dụng chat như Messenger hoặc Zalo.", "Gửi một email văn bản bất đồng bộ để thể hiện sự tôn trọng thời gian và có bằng chứng lưu lại.", "Đến trực tiếp văn phòng khoa khi chưa có lịch hẹn trước."], ans: "C" },
            { ch: 4, c: 10, q: "Khi nhóm sinh viên muốn trao đổi nhanh về một ý tưởng ngắn cho bài tập, phương thức nào được khuyến nghị nên dùng?", arr: ["Viết email chính thức gửi cho toàn bộ thành viên.", "Nhắn tin vào chat nhóm trên các ứng dụng Messenger, Zalo hoặc Teams Chat.", "Lập tức tổ chức một cuộc họp video trực tuyến dài.", "Tạo một tài liệu Word và đính kèm gửi qua email."], ans: "B" },
            { ch: 4, c: 11, q: "Ngữ cảnh nào sau đây bắt buộc phải sử dụng cuộc họp video (Zoom, Meet, Teams) thay vì chat văn bản?", arr: ["Xin góp ý chi tiết cho bản nháp báo cáo từ các thành viên.", "Thông báo thay đổi thời gian làm bài tập nhóm.", "Họp nhóm để phân công nhiệm vụ và thảo luận chi tiết dự án nhằm đảm bảo sự đồng thuận.", "Gửi tài liệu tham khảo vừa tìm được cho nhóm."], ans: "C" },
            { ch: 4, c: 12, q: "Lợi ích của việc sử dụng Google Docs ở chế độ bình luận khi xin góp ý bản nháp báo cáo là gì?", arr: ["Tăng tốc độ đường truyền internet của các thành viên.", "Cho phép góp ý trực tiếp vào văn bản, chi tiết, không làm thay đổi bản gốc và tránh việc tạo ra nhiều phiên bản tệp khác nhau.", "Tự động sửa toàn bộ lỗi chính tả và ngữ pháp mà không cần con người đọc lại.", "Giới hạn quyền xem của những người không đóng góp ý kiến."], ans: "B" },
            { ch: 4, c: 13, q: "Kênh giao tiếp chính thức và quan trọng bậc nhất trong môi trường học thuật và công việc dùng để truyền tải thông tin hiệu quả và thể hiện sự tôn trọng là:", arr: ["Mạng xã hội cá nhân.", "Email (Thư điện tử).", "Ứng dụng nhắn tin tức thời.", "Diễn đàn thảo luận công cộng."], ans: "B" },
            { ch: 4, c: 14, q: "Khi sử dụng email cá nhân để giao tiếp trong môi trường học thuật, sinh viên tuyệt đối phải tránh điều gì?", arr: ["Sử dụng email có định dạng họ và tên nghiêm túc.", "Sử dụng các biệt danh (nickname) thiếu chuyên nghiệp.", "Đính kèm các tệp tài liệu dạng văn bản.", "Điền thông tin vào dòng tiêu đề (Subject)."], ans: "B" },
            { ch: 4, c: 15, q: "Một cấu trúc dòng tiêu đề (Subject) chuẩn giúp giảng viên dễ dàng lọc và quản lý email bao gồm các thành phần theo thứ tự nào?", arr: ["[Họ tên] - [Mã số sinh viên] - [Lời chào]", "[Mã môn học] - [Nội dung chính] - [Họ tên]", "[Nội dung chính] - [Tên giảng viên] - [Tên lớp]", "[Lời kết] - [Mã môn học] - [Biệt danh]"], ans: "B" },
            { ch: 4, c: 16, q: "Trong phần nội dung chính (Body) của email học thuật, quy tắc nào sau đây là ĐÚNG?", arr: ["Viết thành một đoạn dài liên tục để người đọc không phải ngắt quãng tư duy.", "Sử dụng nhiều từ viết tắt của tin nhắn để nội dung được ngắn gọn nhất.", "Giới thiệu ngắn gọn bản thân là ai (tên, lớp, môn học), đi thẳng vào vấn đề và chia đoạn hợp lý.", "Sử dụng ngôn ngữ suồng sã để tạo mối quan hệ thân thiết với người nhận."], ans: "C" },
            { ch: 4, c: 17, q: "Các cụm từ như 'Trân trọng', 'Em xin chân thành cảm ơn', 'Best regards' thuộc thành phần nào của email chuyên nghiệp?", arr: ["Lời chào (Greeting)", "Lời kết (Closing)", "Chữ ký (Signature)", "Tệp đính kèm (Attachment)"], ans: "B" },
            { ch: 4, c: 18, q: "Thành phần chữ ký (Signature) tự động ở cuối email của một sinh viên chuyên nghiệp KHÔNG nhất thiết phải có thông tin nào?", arr: ["Họ và tên đầy đủ.", "Mã số sinh viên, Lớp, Khoa/Trường.", "Số điện thoại liên hệ.", "Danh sách các sở thích cá nhân."], ans: "D" },
            { ch: 4, c: 20, q: "Khi đặt tên cho tệp đính kèm (Attachment) trong email học thuật, sinh viên cần lưu ý điều gì?", arr: ["Để tên mặc định của hệ thống máy tính sau khi xuất tệp.", "Đặt tên tệp rõ ràng, có cấu trúc cụ thể và phải đề cập đến tệp đính kèm trong nội dung email.", "Đặt tên tệp càng dài càng tốt để chứa hết nội dung bên trong.", "Không cần đặt tên bằng tiếng Việt có dấu hoặc không dấu."], ans: "B" },
            { ch: 4, c: 21, q: "Trước cuộc họp trực tuyến, nhiệm vụ nào sau đây thuộc về trách nhiệm của người tổ chức hoặc người điều phối nhóm?", arr: ["Kiểm tra thiết bị camera và microphone của từng thành viên trong nhóm.", "Xác định mục tiêu rõ ràng, lập chương trình nghị sự (Agenda) và gửi lời mời kèm tài liệu trước cho người tham gia.", "Chuẩn bị trang phục lịch sự cho toàn bộ các thành viên tham gia họp.", "Tự động ghi âm và bảo mật tuyệt đối không chia sẻ Agenda."], ans: "B" },
            { ch: 4, c: 22, q: "Đối với người tham gia cuộc họp trực tuyến, yêu cầu tối thiểu trước khi bước vào cuộc họp để đạt hiệu quả là gì?", arr: ["Tự thiết kế một nền ảo (background) thật lộng lẫy.", "Đọc trước chương trình nghị sự (Agenda) và tài liệu được gửi.", "Soạn thảo sẵn biên bản kết luận cuộc họp khi chưa thảo luận.", "Gửi tin nhắn yêu cầu trưởng nhóm báo cáo tiến độ trước."], ans: "B" },
            { ch: 4, c: 23, q: "Việc kiểm tra camera, microphone và kết nối Internet của người tham gia cần được thực hiện vào thời điểm nào trước cuộc họp trực tuyến?", arr: ["Ngay khi cuộc họp đã bắt đầu được 10 phút.", "Ít nhất 5 phút trước giờ cuộc họp bắt đầu.", "Chỉ khi trưởng nhóm yêu cầu bật mic phát biểu.", "After the meeting finishes to prepare for next time."], ans: "B" },
            { ch: 4, c: 24, q: "Trong cuộc họp trực tuyến, hành động nào sau đây là quy tắc tương tác cá nhân bắt buộc để tránh tạp âm?", arr: ["Luôn bật micro để sẵn sàng tranh luận bất cứ lúc nào.", "Tắt micro khi không nói và chỉ bật khi phát biểu.", "Bật loa ngoài ở mức âm lượng lớn nhất để nghe rõ.", "Tắt camera trong suốt quá trình người khác nói."], ans: "B" },
            { ch: 4, c: 25, q: "Nhìn vào camera khi nói trong một cuộc họp trực tuyến có tác dụng gì?", arr: ["Giúp kiểm tra xem khuôn mặt mình có bị mờ hay không.", "Tạo cảm giác giao tiếp bằng mắt, tăng sự kết nối với người khác.", "Giúp hệ thống AI tự động nhận diện danh tính nhanh hơn.", "Tránh việc phải nhìn vào các tài liệu trên màn hình."], ans: "B" },
            { ch: 4, c: 26, q: "Kỹ năng điều phối nào sau đây thuộc về trách nhiệm của trưởng nhóm trong cuộc họp trực tuyến?", arr: ["Cho phép cuộc họp kéo dài vô thời hạn để thảo luận hết mọi vấn đề phát sinh ngoài lề.", "Bắt đầu và kết thúc đúng giờ, dẫn dắt thảo luận bám sát Agenda, tóm tắt các quyết định và đầu việc trước khi kết thúc.", "Chỉ tập trung lắng nghe những người nói nhiều và bỏ qua những người trầm tính.", "Tự mình đưa ra mọi quyết định mà không cần lấy ý kiến của các thành viên."], ans: "B" },
            { ch: 4, c: 27, q: "Văn bản tóm tắt ngắn gọn về các quyết định đã được thống nhất và danh sách công việc tiếp theo kèm người phụ trách, hạn chót sau cuộc họp được gọi là:", arr: ["Chương trình nghị sự (Agenda).", "Biên bản cuộc họp (Meeting minutes).", "Quy tắc nhóm (Team Charter).", "Hồ sơ năng lực (Portfolio)."], ans: "C" },
            { ch: 4, c: 28, q: "Nền tảng mạng xã hội nào được tài liệu đánh giá là quan trọng nhất cho mục đích học tập, xây dựng hồ sơ chuyên nghiệp và tìm kiếm cơ hội việc làm?", arr: ["Instagram", "TikTok", "LinkedIn", "Facebook cá nhân"], ans: "C" },
            { ch: 4, c: 29, q: "Trong quy tắc ứng xử trên các ứng dụng nhắn tin (Chat), hành động nào thể hiện sự tôn trọng thời gian của người nhận?", arr: ["Nhắn nhiều tin nhỏ, liên tục để đối phương liên tục nhận được chuông thông báo.", "Đi thẳng vào vấn đề ngắn gọn, gộp ý vào tin nhắn dài và hạn chế nhắn ngoài giờ học/làm việc trừ khi khẩn cấp.", "Luôn nhắn tin vào ban đêm để người nhận đọc được ngay khi thức dậy vào sáng hôm sau.", "Sử dụng thật nhiều từ viết tắt để người nhận tiết kiệm thời gian đọc."], ans: "B" },
            { ch: 4, c: 30, q: "'Quy tắc vàng' trước khi đăng tải bất cứ nội dung gì lên mạng xã hội là:", arr: ["Phải chỉnh sửa hình ảnh thật đẹp và tăng tối đa lượt tương tác.", "Không đăng bất cứ điều gì bạn không muốn ông bà, bố mẹ hoặc nhà tuyển dụng tương lai nhìn thấy.", "Chỉ đăng những nội dung mang tính tranh luận gay gắt để thu hút dư luận.", "Chia sẻ lại toàn bộ các bài viết từ những trang tin tức có nhiều lượt theo dõi."], ans: "B" },
            { ch: 4, c: 31, q: "Điểm cốt lõi phân biệt cộng tác số (Digital Collaboration) với giao tiếp số đơn thuần là gì?", arr: ["Cộng tác số không cho phép sử dụng các ứng dụng trò chuyện.", "Cộng tác số nhấn mạnh vào việc cùng nhau làm việc để tạo ra một kết quả chung.", "Cộng tác số bắt buộc phải diễn ra trên nền tảng mạng xã hội.", "Giao tiếp số yêu cầu chi phí phần cứng cao hơn cộng tác số."], ans: "C" },
            { ch: 4, c: 32, q: "Văn bản được lập ra ngay từ đầu dự án để thống nhất các quy tắc cơ bản của nhóm về kênh giao tiếp, tần suất họp, cách cập nhật tiến độ và ra quyết định gọi là gì?", arr: ["Biên bản cuộc họp (Meeting minutes).", "Chương trình nghị sự (Agenda).", "Quy tắc nhóm (Team Charter).", "Kế hoạch chiến lược (Strategic Plan)."], ans: "C" },
            { ch: 4, c: 33, q: "Ba yếu tố văn hóa nền tảng quyết định sự thành công của một nhóm làm việc từ xa là:", arr: ["Thiết bị, Đường truyền, Phần mềm.", "Kỷ luật, Thưởng phạt, Giám sát.", "Tin tưởng (Trust), Rõ ràng (Clarity), Tôn trọng (Respect).", "Tốc độ, Sản lượng, Quy mô."], ans: "C" },
            { ch: 4, c: 34, q: "Phương pháp quản lý dự án nào được áp dụng trong công cụ Trello giúp người dùng quản lý công việc trực quan bằng các bảng, danh sách và thẻ kéo-thả?", arr: ["Phương pháp Thác nước (Waterfall).", "Phương pháp Kanban.", "Phương pháp Đường găng (CPM).", "Phương pháp Sơ đồ chuỗi (PERT)."], ans: "B" },
            { ch: 4, c: 35, q: "Nhược điểm chính của công cụ quản lý dự án Asana so với Trello là gì?", arr: ["Không hỗ trợ chế độ xem theo lịch và dòng thời gian.", "Giao diện có thể hơi phức tạp và dễ gây choáng ngợp đối với người mới bắt đầu.", "Không cho phép phân chia các nhiệm vụ phụ chi tiết.", "Chỉ giới hạn số lượng công việc được tạo trong ngày."], ans: "B" },
            { ch: 4, c: 36, q: "Nền tảng nào được mô tả là một không gian làm việc tích hợp 'tất cả trong một', cho phép tạo ghi chú, tài liệu (wiki) và cơ sở dữ liệu trên cùng một nơi?", arr: ["Trello", "Asana", "Notion", "Microsoft Teams"], ans: "C" },
            { ch: 4, c: 37, q: "Công cụ lên lịch thông minh nào cho phép người dùng kết nối lịch cá nhân, tạo một đường link duy nhất để người khác tự chọn khung giờ trống và tự động thêm cuộc hẹn vào lịch hai bên?", arr: ["Reclaim.ai", "Calendly", "Google Sheets", "Trello"], ans: "B" },
            { ch: 4, c: 38, q: "Điểm nâng cao của công cụ Reclaim.ai so với các công cụ lên lịch thông thường là gì?", arr: ["Tự động trả lời email thay cho người dùng.", "Tự động sắp xếp và bảo vệ thời gian cho các thói quen (Habits) và công việc (Tasks), có tính linh hoạt dịch chuyển lịch khi có việc quan trọng hơn.", "Tự động xóa các lịch hẹn cũ để giải phóng bộ nhớ.", "Giới hạn số lượng cuộc họp tối đa trong một tuần."], ans: "B" },
            { ch: 4, c: 39, q: "Công cụ AI nào sau đây được thiết kế chuyên dụng cho tài liệu khoa học, giúp tự động đọc bài báo (PDF) và trích xuất các phần như giả thuyết, phương pháp, kết quả?", arr: ["QuillBot", "Resoomer", "Scholarcy / SciSpace", "Google Translate"], ans: "C" },
            { ch: 4, c: 40, q: "Việc sử dụng AI để tóm tắt tài liệu học thuật cần tuân thủ cảnh báo đạo đức nào sau đây?", arr: ["Chỉ được dùng AI tóm tắt tài liệu khi có sự cho phép bằng văn bản của tác giả bài báo.", "Sử dụng nhằm mục đích hỗ trợ đọc hiểu, tuyệt đối không nộp bản tóm tắt do AI tạo ra như là sản phẩm tự làm của mình.", "Không được phép dùng AI tóm tắt các tài liệu viết bằng tiếng nước ngoài.", "Chỉ sử dụng các chatbot AI nhỏ, không được dùng các mô hình ngôn ngữ lớn để tóm tắt."], ans: "B" },
            { ch: 4, c: 41, q: "Một sinh viên cần xin phép giảng viên hướng dẫn về việc dời lịch báo cáo tiến độ bài tập lớn do trùng lịch thi học kỳ. Theo quy tắc lựa chọn phương thức giao tiếp phù hợp, hành động nào là đúng chuẩn mực?", arr: ["Viết một email từ địa chỉ trường cấp, tiêu đề theo cấu trúc chuẩn [Mã môn học] - Xin dời lịch báo cáo tiến độ - [Họ tên sinh viên], nội dung rõ ràng, lịch sự và gửi trước vài ngày.", "Chờ đến đúng giờ báo cáo tiến độ trực tuyến rồi bật micro giải thích lý do với giảng viên trước lớp.", "Nhắn tin liên tục vào tài khoản mạng xã hội cá nhân của giảng viên để thúc giục nhận được câu trả lời ngay lập tức.", "Gọi điện thoại trực tiếp cho giảng viên vào khung giờ muộn sau 10 giờ đêm để giải thích tình huống khẩn cấp."], ans: "A" },
            { ch: 4, c: 42, q: "Một sinh viên soạn một email gửi giảng viên với tiêu đề: bai tap chuong 4 và nội dung chỉ vỏn vẹn dòng chữ: Thầy xem giúp em bài đính kèm đã đúng chưa ạ kèm tệp tin tên là Document1.docx. Email này đã vi phạm những lỗi quy cách nào?", arr: ["Viram tính bảo mật thông tin cá nhân của giảng viên.", "Tiêu đề không đúng cấu trúc chuẩn, nội dung thiếu phần giới thiệu bản thân, ngôn ngữ quá suồng sã, tệp đính kèm không được đặt tên rõ ràng theo cấu trúc chuyên nghiệp.", "Email quá ngắn gọn khiến hệ thống lọc thư rác tự động xóa bỏ mà không thể gửi đi.", "Vi phạm nguyên tắc Netiquette về việc gửi thư ngoài giờ hành chính."], ans: "B" },
            { ch: 4, c: 43, q: "Một nhóm sinh viên gồm 4 thành viên đang thực hiện một dự án bài tập lớn kéo dài trong 3 tuần. Công việc cần phân chia chi tiết, có nhiều nhiệm vụ phụ phụ thuộc lẫn nhau và cần theo dõi sát sao tiến độ theo dòng thời gian (timeline). Dựa trên Bảng 4.2, nhóm nên chọn nền tảng nào?", arr: ["Trello, vì giao diện kéo-thả đơn giản phù hợp với các dự án rất ngắn không cần quản lý nhiệm vụ phụ.", "Asana, vì nền tảng này hỗ trợ quản lý công việc chi tiết, có nhiều chế độ xem (lịch, timeline) và quản lý tốt sự phụ thuộc giữa các nhiệm vụ.", "Notion, vì đây là công cụ đơn giản nhất không cần mất thời gian học cách xây dựng cấu trúc hệ thống.", "Chỉ sử dụng khung chat của nhóm trên ứng dụng nhắn tin để cập nhật tiến độ hàng ngày."], ans: "B" },
            { ch: 4, c: 44, q: "Trong quá trình thảo luận nhóm qua tin nhắn chat, hai thành viên xảy ra bất đồng quan điểm gay gắt về phương pháp làm bài, dẫn đến các dòng tin nhắn công kích cá nhân và làm không khí nhóm căng thẳng. Để giải quyết xung đột một cách xây dựng theo tài liệu, nhóm nên làm gì?", arr: ["Yêu cầu hai thành viên tiếp tục tranh luận bằng văn bản cho đến khi một trong hai bên chịu thỏa hiệp.", "Trưởng nhóm lập tức báo cáo danh sách hai thành viên này cho giảng viên bộ môn để hạ điểm rèn luyện.", "Đề nghị tổ chức một cuộc gọi video ngắn để các bên trao đổi trực tiếp, làm rõ ý định và giảm hiểu lầm nhờ phân tích giọng điệu, nét mặt.", "Xóa hai thành viên ra khỏi nhóm chat chung để nhóm tiếp tục làm việc bình thường."], ans: "C" },
            { ch: 4, c: 45, q: "Một sinh viên cần dịch một bài báo khoa học chuyên ngành có nhiều lập luận sâu sắc và thuật ngữ phức tạp từ tiếng Anh sang tiếng Việt để phục vụ làm tiểu luận. Áp dụng các lời khuyên từ Bảng 4.3, quy trình làm việc nào là thông minh và đúng đạo đức học thuật nhất?", arr: ["Dùng Google Translate dịch nhanh toàn bộ bài báo để nắm ý chính, sau đó dùng DeepL để dịch lại các đoạn văn bản phức tạp nhằm lấy câu văn tự nhiên, đối chiếu thuật ngữ với nguồn đáng tin cậy và tự viết lại bài làm của mình.", "Dán toàn bộ văn bản vào DeepL, lấy bản dịch tự động và sao chép-dán thẳng vào bài tiểu luận để nộp mà không cần đọc lại.", "Sử dụng công cụ quét ảnh dịch tự động để đọc nhanh trên điện thoại và không cần ghi nguồn tài liệu tham khảo.", "Từ bỏ việc dịch thuật thuật ngữ chuyên ngành và dùng AI tự viết hoàn toàn một văn bản mới dựa trên từ khóa."], ans: "A" },// === CHƯƠNG 5: SÁNG TẠO NỘI DUNG SỐ (CÂU 1 - 30) ===
            { ch: 5, c: 1, q: "Sinh viên muốn sáng tạo một video ngắn hướng dẫn cách sử dụng công cụ ChatGPT cho các bạn cùng khóa. Theo quy trình 6 bước, hành động nào sau đây thuộc về bước nền tảng đầu tiên?", arr: ["Lựa chọn phần mềm dựng video (ví dụ: CapCut) và bắt đầu quay màn hình.", "Xác định mục tiêu của video và đối tượng người xem để định hướng nội dung.", "Kiểm tra lỗi chính tả trong phụ đề của video và điều chỉnh lại.", "Biên tập và tinh chỉnh trước khi tải video lên nền tảng lưu trữ (ví dụ: Youtube)."], ans: "B" },
            { ch: 5, c: 2, q: "In giai đoạn lên ý tưởng cho nội dung để viết bài blog, cách sử dụng AI tạo sinh nào sau đây là hiệu quả và phù hợp nhất để hỗ trợ?", arr: ["Yêu cầu AI thực hiện việc xây dựng toàn bộ nội dung bài viết.", "Yêu cầu AI thực hiện việc kiểm tra lỗi ngữ pháp và chỉnh sửa văn phong cho nội dung.", "Yêu cầu AI gợi ý các chủ đề và lập dàn ý chi tiết.", "Không nên sử dụng AI vì sẽ làm mất tính sáng tạo."], ans: "C" },
            { ch: 5, c: 3, q: "Công cụ thiết kế trực tuyến nào tích hợp sẵn AI, cho phép người dùng không chuyên tạo các ấn phẩm đồ họa (như poster, infographic) một cách dễ dàng?", arr: ["Adobe Photoshop", "Canva", "Adobe Illustrator", "Figma"], ans: "B" },
            { ch: 5, c: 4, q: "Công cụ nào sau đây là phù hợp nhất để giúp tạo nhanh một bài thuyết trình với thiết kế hiện đại từ một dàn ý hoặc văn bản có sẵn?", arr: ["Gamma.app", "Microsoft PowerPoint", "Adobe InDesign", "Google Docs"], ans: "A" },
            { ch: 5, c: 5, q: "Để tạo ra một hình ảnh minh họa độc đáo bằng công cụ AI, yêu cầu nào là quan trọng nhất trong câu lệnh (prompt)?", arr: ["Yêu cầu AI đóng vai một nghệ sĩ chuyên nghiệp để định hình phong cách hình ảnh.", "Mô tả chi tiết về đối tượng, bối cảnh, phong cách nghệ thuật và màu sắc.", "Chỉ cần sử dụng các từ khóa về cảm xúc mà không mô tả đối tượng.", "Viết càng ngắn gọn càng tốt để AI có thể tự do sáng tạo."], ans: "B" },
            { ch: 5, c: 6, q: "Khi sử dụng một hình ảnh từ Internet có giấy phép Creative Commons 'CC BY-NC' (Ghi công - Phi thương mại), hành động nào sau đây là vi phạm bản quyền?", arr: ["Sử dụng hình ảnh trong bài thuyết trình lớp học và ghi rõ tên tác giả.", "In hình ảnh lên áo phông để bán gây quỹ làm từ thiện.", "Chia sẻ hình ảnh trên blog cá nhân phi lợi nhuận và ghi nguồn.", "Lưu hình ảnh về máy tính để làm hình nền cá nhân."], ans: "B" },
            { ch: 5, c: 7, q: "Tại sao bước 'Đánh giá và tinh chỉnh' nội dung do AI tạo ra lại cực kỳ quan trọng trước khi sử dụng hoặc xuất bản?", arr: ["Để đảm bảo AI đã sử dụng đúng các thuật ngữ chuyên môn.", "Vì các công cụ AI yêu cầu người dùng phải chỉnh sửa mới cho phép tải về.", "Vì AI chỉ hỗ trợ các tác vụ giải trí, không thể xử lý các tài liệu học thuật.", "Vì AI có thể tạo ra thông tin sai lệch, tái tạo thiên kiến hoặc thiếu dấu ấn cá nhân."], ans: "D" },
            { ch: 5, c: 8, q: "Theo định nghĩa, 'Nội dung số' (Digital Content) là bất kỳ nội dung nào tồn tại dưới dạng dữ liệu số, được mã hóa ở định dạng mà máy tính có thể đọc và cho phép thực hiện các thao tác nào bằng thiết bị kỹ thuật số?", arr: ["Chỉ cho phép xem và lưu trữ cố định.", "Tạo, xem, phân phối, sửa đổi và lưu trữ.", "Chỉ cho phép chia sẻ mạng nội bộ.", "Mã hóa bảo mật không thể chỉnh sửa."], ans: "B" },
            { ch: 5, c: 9, q: "Dạng nội dung số nào là cơ bản và phổ biến nhất, bao gồm bài luận, báo cáo, email, kịch bản và ghi chú bài giảng?", arr: ["Nội dung đa phương tiện", "Nội dung văn bản", "Nội dung hình ảnh", "Nội dung video"], ans: "B" },
            { ch: 5, c: 10, q: "Khi cần truyền tải các thông tin chi tiết, phức tạp với chi phí sản xuất thấp và dễ tìm kiếm dữ liệu, định dạng nội dung nào là tối ưu nhất?", arr: ["Video", "Âm thanh", "Văn bản", "Đa phương tiện"], ans: "C" },
            { ch: 5, c: 11, q: "Một trong những nhược điểm lớn của nội dung hình ảnh (Image Content) được nhắc đến trong tài liệu là gì?", arr: ["Không thu hút được sự chú ý nhanh chóng của người xem.", "Khó diễn đạt các ý tưởng trừu tượng và phức tạp nếu chỉ bằng hình ảnh.", "Chi phí lưu trữ dữ liệu rất đắt đỏ so với video.", "Định dạng không tương thích với các công cụ tìm kiếm trực tuyến."], ans: "B" },
            { ch: 5, c: 12, q: "Định dạng nội dung nào có ưu điểm lớn là tạo cảm giác gần gũi, thân mật và cho phép người dùng tiếp thu thông tin linh hoạt ngay cả khi đang làm việc khác?", arr: ["Văn bản", "Âm thanh", "Hình ảnh", "Đa phương tiện"], ans: "B" },
            { ch: 5, c: 13, q: "Nội dung đa phương tiện (Multimedia/Interactive Content) tích hợp nhiều loại hình nội dung khác nhau nhằm mục đích cốt lõi nào?", arr: ["Giảm thiểu tối đa dung lượng tệp lưu trữ trên hệ thống.", "Tạo ra trải nghiệm phong phú và mang tính tương tác cao cho người dùng.", "Thay thế hoàn toàn vai trò viết kịch bản của con người.", "Đơn giản hóa quy trình sản xuất phần mềm."], ans: "B" },
            { ch: 5, c: 14, q: "Sáng tạo nội dung số được khẳng định là một quy trình có phương pháp và hệ thống bao gồm bao nhiêu bước cốt lõi?", arr: ["4 bước", "5 bước", "6 bước", "7 bước"], ans: "C" },
            { ch: 5, c: 15, q: "Trong bước thứ 2 (Lập kế hoạch - Planning) của quy trình sáng tạo nội dung, mục tiêu SMART yêu cầu phải đảm bảo đầy đủ các yếu tố nào?", arr: ["Cụ thể, Đo lường được, Khả thi, Liên quan, Có thời hạn.", "Bí mật, Đo lường được, Khả thi, Liên quan, Có thời hạn.", "Cụ thể, Mô tả được, Khả thi, Liên quan, Không giới hạn thời gian.", "Cụ thể, Đo lường được, Sáng tạo, Liên quan, Có thời hạn."], ans: "A" },
            { ch: 5, c: 16, q: "Ký hiệu 'CTA' trong bước lập kế hoạch sáng tạo nội dung số viết tắt của cụm từ nào và mang ý nghĩa gì?", arr: ["Creative Text Agency - Đơn vị sáng tạo văn bản.", "Call to Action - Lời kêu gọi hành động đối với người xem.", "Content Total Asset - Tổng tài sản nội dung.", "Check Technical Accuracy - Kiểm tra độ chính xác kỹ thuật."], ans: "B" },
            { ch: 5, c: 17, q: "Các chỉ số hiệu quả như lượt xem, lượt thích, bình luận, chia sẻ dùng trong bước 'Đo lường và Tối ưu' được gọi chung là gì?", arr: ["IPs", "SMARTs", "KPIs", "CTAs"], ans: "C" },
            { ch: 5, c: 18, q: "Nguyên tắc vận hành cơ bản của 'Bản quyền' (Copyright) đối với một tác phẩm văn học, nghệ thuật, khoa học là gì?", arr: ["Bắt buộc phải được cấp chứng nhận đăng ký của cơ quan quản lý mới có hiệu lực.", "Phát sinh tự động ngay khi tác phẩm được định hình dưới một dạng vật chất nhất định.", "Chỉ có hiệu lực sau khi tác phẩm được xuất bản thương mại.", "Tự động biến mất nếu tác giả chia sẻ tác phẩm lên không gian mạng."], ans: "B" },
            { ch: 5, c: 19, q: "Hành vi diễn đạt lại (paraphrase) ý tưởng hoặc lời nói của người khác bằng lời văn của mình mà không trích dẫn nguồn gốc thì bị coi là hành vi gì?", arr: ["Sử dụng hợp lý (Fair Use).", "Đạo văn (Plagiarism).", "Sáng tạo nội dung phái sinh.", "Sở hữu trí tuệ tự động."], ans: "B" },
            { ch: 5, c: 20, q: "Luật pháp cho phép sử dụng một phần tác phẩm có bản quyền mà không cần xin phép nhằm mục đích phi thương mại như bình luận, giảng dạy, nghiên cứu dưới tên gọi quy định nào?", arr: ["Quyền tác giả phát sinh.", "Sử dụng hợp lý (Fair Use / Fair Dealing).", "Giấy phép mở toàn diện.", "Quyền nhân thân vĩnh viễn."], ans: "B" },
            { ch: 5, c: 21, q: "Loại giấy phép Creative Commons nào cho phép người khác tự do sao chép, phân phối, sửa đổi tác phẩm kể cả cho mục đích thương mại, miễn là phải ghi công tác giả gốc?", arr: ["CC BY-NC", "CC BY-SA", "CC BY", "CC BY-ND"], ans: "C" },
            { ch: 5, c: 22, q: "Điểm khác biệt của giấy phép Creative Commons kí hiệu 'CC BY-ND' (Không phái sinh) so với các loại giấy phép CC khác là gì?", arr: ["Không cho phép sao chép tác phẩm nguyên gốc.", "Cho phép sao chép và phân phối tác phẩm nguyên gốc nhưng không được sửa đổi hay tạo tác phẩm phái sinh.", "Bắt buộc phải trả phí bản quyền cho tác giả gốc khi phân phối.", "Chỉ được sử dụng trong các môi trường phi thương mại."], ans: "B" },
            { ch: 5, c: 23, q: "Công cụ nào dưới đây được ví như 'bộ não số thứ hai', phù hợp nhất cho giai đoạn thu thập thông tin, ghi chú bài giảng và phác thảo dàn ý?", arr: ["Microsoft Word", "Google Docs", "Notion / OneNote", "Grammarly"], ans: "C" },
            { ch: 5, c: 24, q: "Công cụ Grammarly hỗ trợ tốt nhất cho sinh viên ở giai đoạn nào trong quy trình xử lý nội dung văn bản?", arr: ["Lên ý tưởng sơ khởi và brainstorm.", "Rà soát, kiểm tra lỗi chính tả, ngữ pháp, văn phong và kiểm tra đạo văn trước khi nộp bài.", "Tự động dịch thuật toàn bộ văn bản sang ngôn ngữ mới.", "Thiết kế giao diện đồ họa cho văn bản."], ans: "B" },
            { ch: 5, c: 25, q: "Nhóm công cụ bao gồm ChatGPT, Gemini, Copilot hỗ trợ tốt nhất cho người dùng khi gặp phải tình huống nào trong viết lách?", arr: ["Khi cần thiết kế poster đồ họa kéo-thả nhanh chóng.", "Khi bị 'bí' ý tưởng, cần tạo dàn ý chi tiết hoặc cần diễn đạt lại câu văn theo nhiều văn phong.", "Khi cần tự động xóa nền pháp lý của một video.", "Khi cần ghi âm và lọc tạp âm chuyên sâu của phòng thu."], ans: "B" },
            { ch: 5, c: 26, q: "Công cụ online chạy trực tiếp trên trình duyệt nào được mô tả là giải pháp thay thế miễn phí rất tốt cho Adobe Photoshop với giao diện và tính năng gần như tương đương?", arr: ["Canva", "Photopea", "GIMP", "Remove.bg"], ans: "B" },
            { ch: 5, c: 27, q: "Công cụ AI nào dựa trên nền tảng trực tuyến miễn phí giúp tự động 'làm sạch' file âm thanh chất lượng kém, loại bỏ tiếng vang, tiếng ồn thành giọng trong trẻo?", arr: ["Audacity", "Adobe Podcast Enhance", "Descript", "Adobe Audition"], ans: "B" },
            { ch: 5, c: 28, q: "Tính năng đột phá nào của công cụ AI mang tên Descript giúp ích rất nhiều cho việc chỉnh sửa các tệp âm thanh dài như podcast hay phỏng vấn?", arr: ["Tự động tạo nhạc nền không bản quyền từ văn bản.", "Tự động chuyển giọng nói thành văn bản và khi sửa đoạn văn bản thì file âm thanh tự động thay đổi theo.", "Tự động dịch giọng nói sang 100 ngôn ngữ khác nhau trong thời gian thực.", "Tự động đồng bộ âm thanh với các hình ảnh chuyển động của camera."], ans: "B" },
            { ch: 5, c: 29, q: "Khi làm nội dung video hoặc podcast, để tránh các vấn đề pháp lý hoặc bị gỡ bỏ sản phẩm, người dùng bắt buộc phải tìm kiếm âm nhạc và hiệu ứng âm thanh từ nguồn nào?", arr: ["Tải bất kỳ bài hát nào đang thịnh hành trên các nền tảng mạng xã hội.", "Sử dụng các nguồn nhạc 'royalty-free' (miễn phí bản quyền) như YouTube Audio Library, Pixabay Music.", "Sao chép nhạc từ các đĩa CD truyền thống.", "Tự ý cắt một đoạn nhạc ngắn dưới 30 giây của nghệ sĩ nổi tiếng mà không ghi nguồn."], ans: "B" },
            { ch: 5, c: 30, q: "Tiêu chí 'Thiên kiến' (Bias) trong checklist đánh giá nội dung do AI tạo ra nhắc nhở người dùng cần phải kiểm tra điều gì?", arr: ["Kiểm tra xem các số liệu, sự kiện có đúng sự thật khách quan không.", "Kiểm tra xem nội dung có chứa các định kiến tiêu cực về giới tính, chủng tộc, văn hóa, vùng miền hay không.", "Kiểm tra xem văn bản có bị rập khuôn cấu trúc ngữ pháp hay không.", "Kiểm tra xem nội dung đã trả lời đúng yêu cầu của câu lệnh ban đầu chưa."], ans: "B" },

            // === CHƯƠNG 6: AN TOÀN SỐ VÀ LIÊM CHÍNH HỌC THUẬT (CÂU 1 - 40) ===
            { ch: 6, c: 1, q: "Thuật ngữ nào dùng để chỉ hình thức lừa đảo trực tuyến trong đó kẻ tấn công giả mạo một đơn vị uy tín (như ngân hàng, trường học) qua email để đánh cắp thông tin cá nhân?", arr: ["Phishing", "Hacking", "Ransomware", "DDoS"], ans: "A" },
            { ch: 6, c: 2, q: "Biện pháp nào sau đây được coi là lớp bảo vệ quan trọng nhất để ngăn chặn truy cập trái phép vào tài khoản trực tuyến, ngay cả khi mật khẩu bị lộ?", arr: ["Cài đặt và cập nhật thường xuyên phần mềm diệt virus.", "Sử dụng xác thực hai yếu tố.", "Sử dụng trình duyệt ẩn danh.", "Xóa lịch sử duyệt web hàng ngày."], ans: "B" },
            { ch: 6, c: 3, q: "Hành động nào sau đây bị coi là vi phạm liêm chính học thuật (đạo văn)?", arr: ["Sao chép một đoạn văn từ tài liệu tham khảo, đặt trong ngoặc kép và ghi rõ nguồn.", "Diễn giải (paraphrase) ý tưởng của người khác bằng ngôn ngữ của mình và có trích dẫn nguồn.", "Sao chép một đoạn văn từ Internet vào bài làm của mình mà không ghi nhận nguồn.", "Viết bài dựa trên kiến thức và trải nghiệm của bản thân."], ans: "C" },
            { ch: 6, c: 4, q: "Theo chuẩn trích dẫn Harvard được hướng dẫn trong bài giảng, khi trích dẫn một ý tưởng trong bài viết (in-text citation), thông tin nào cần được ghi lại ngay sau câu trích dẫn?", arr: ["(Họ tác giả, Năm xuất bản)", "(Tên bài báo, Số trang)", "(Tiêu đề tác phẩm, URL)", "(Tên nhà xuất bản, Năm công bố)"], ans: "A" },
            { ch: 6, c: 5, q: "Khái niệm An sinh số (Digital Well-being) khuyến khích sinh viên thực hiện hành động nào sau đây?", arr: ["Luôn bật thông báo và dành thời gian tối đa trực tuyến để tránh hội chứng sợ bỏ lỡ (FOMO).", "Sử dụng các công cụ để thiết lập giới hạn và duy trì sự cân bằng giữa thế giới số và thế giới thực.", "Tăng cường sử dụng ánh sáng xanh từ màn hình để cải thiện khả năng tập trung vào buổi tối.", "Thay thế giao tiếp trực tiếp bằng giao tiếp qua mạng xã hội."], ans: "B" },
            { ch: 6, c: 6, q: "Khi sử dụng nội dung do ChatGPT tạo ra để hỗ trợ làm bài tập, hành động nào sau đây là phù hợp với nguyên tắc đạo đức và liêm chính học thuật?", arr: ["Dán nội dung do AI tạo ra vào bài làm, chỉ cần chỉnh sửa văn phong, không cần kiểm chứng thông tin.", "Sử dụng AI để dịch thuật hoặc tóm tắt tài liệu, không cần ghi chú vì đó là kết quả của công cụ.", "Chỉnh sửa một vài từ trong câu trả lời của ChatGPT và không ghi chú gì thêm.", "Sử dụng AI để lên ý tưởng, sau đó tự viết, kiểm chứng thông tin, và ghi nhận sự hỗ trợ của AI trong bài làm."], ans: "D" },
            { ch: 6, c: 7, q: "Theo nguyên tắc Liêm chính học thuật, hành vi viết lại ý tưởng của người khác bằng lời văn của mình nhưng KHÔNG trích dẫn nguồn được xem là hình thức vi phạm nào?", arr: ["Bịa đặt (Fabrication), vì sinh viên đã tự tạo ra dữ liệu không có thật.", "Đạo văn (Plagiarism), vì ý tưởng gốc vẫn thuộc về sở hữu trí tuệ của người khác.", "Gian lận (Fraud), vì sinh viên đã sử dụng các thủ đoạn gian lận trong bài viết.", "Sử dụng hợp lý (Fair Use), do đó không cần bận tâm đến việc trích dẫn nguồn."], ans: "B" },
            { ch: 6, c: 8, q: "Tập tập hợp toàn bộ các dấu vết dữ liệu mà một cá nhân cố ý hoặc vô tình tạo ra và để lại khi sử dụng Internet được gọi là gì?", arr: ["Danh tính số", "Dấu chân số (Digital Footprint)", "Hồ sơ định danh", "Lịch sử truy vết"], ans: "B" },
            { ch: 6, c: 9, q: "Việc một sinh viên đăng tải hình ảnh cá nhân lên mạng xã hội Instagram hoặc viết bình luận công khai trên một bài blog thuộc loại dấu chân số nào?", arr: ["Dấu chân số bị động", "Dấu chân số ẩn danh", "Dấu chân số chủ động (Active Digital Footprint)", "Dấu chân số hệ thống"], ans: "C" },
            { ch: 6, c: 10, q: "Loại dữ liệu nào sau đây được xếp vào 'Dấu chân số bị động' (Passive Digital Footprint)?", arr: ["Email chính thức gửi cho giảng viên trường.", "Địa chỉ IP, lịch sử tìm kiếm và vị trí địa lý bị hệ thống thu thập tự động.", "Trạng thái chia sẻ công khai trong nhóm học tập.", "Tệp tin đính kèm bài tập lớn nộp trên hệ thống trực tuyến."], ans: "B" },
            { ch: 6, c: 11, q: "Nhận thức đúng đắn về quyền riêng tư trong kỷ nguyên số đòi hỏi người dùng phải chuyển đổi tư duy như thế nào?", arr: ["Chỉ quan tâm đến những gì mình lựa chọn chủ động chia sẻ công khai.", "Chuyển từ việc chỉ nghĩ về 'những gì tôi chọn chia sẻ' sang 'những gì đang bị thu thập về tôi'.", "Tin tưởng tuyệt đối vào hệ thống bảo mật mặc định của các nền tảng xuyên quốc gia.", "Ngừng hoàn toàn việc sử dụng mạng Internet để bảo vệ dữ liệu tuyệt đối."], ans: "B" },
            { ch: 6, c: 12, q: "Hình thức lừa đảo trực tuyến bằng cách dán các mã độc hại đè lên các áp phích, thông báo trong khuôn viên trường học để dẫn sinh viên đến các trang web giả mạo gọi là gì?", arr: ["Smishing", "QR Code Phishing (Lừa đảo qua mã QR)", "Spear Phishing", "Botnet Hacking"], ans: "B" },
            { ch: 6, c: 13, q: "Loại phần mềm độc hại nào thực hiện hành vi mã hóa toàn bộ dữ liệu trên thiết bị của nạn nhân và đòi hỏi một khoản tiền để cấp khóa giải mã?", arr: ["Trojan Horse", "Spyware", "Ransomware (Mã độc tống tiền)", "Rootkit"], ans: "C" },
            { ch: 6, c: 14, q: "Khi kẻ tấn công sử dụng một mạng lưới các máy tính bị chiếm quyền điều khiển (botnet) để làm quá tải và tê liệt hệ thống quản lý học tập (LMS) của trường học, hình thức tấn công này là gì?", arr: ["Tấn công giả mạo (Phishing)", "Tấn công từ chối dịch vụ phân tán (DDoS)", "Tấn công Social Engineering", "Tấn công Ransomware"], ans: "B" },
            { ch: 6, c: 15, q: "Các mối đe dọa an ninh mạng do AI hỗ trợ (AI-powered Threats) trở nên nguy hiểm và tinh vi hơn chủ yếu vì lý do nào?", arr: ["AI làm tăng dung lượng lưu trữ của mã độc lên gấp nhiều lần.", "AI có thể tạo ra các email lừa đảo không có lỗi chính tả/ngữ pháp và tạo ra video/âm thanh giả mạo (deepfake) rất khó phát hiện.", "AI giúp kẻ tấn công phá hủy phần cứng máy tính từ xa.", "AI có thể hoạt động độc lập mà không cần kết nối mạng Internet."], ans: "B" },
            { ch: 6, c: 16, q: "Tư duy cốt lõi được khuyến nghị giúp sinh viên ứng phó hiệu quả với các mối đe dọa công nghệ cao do AI hỗ trợ là gì?", arr: ["Tư duy hoài nghi có phương pháp và chủ động xác minh qua kênh liên lạc đáng tin cậy.", "Tư duy chấp nhận rủi ro và hạn chế sử dụng email trường.", "Tuyệt đối tin tưởng vào các cuộc gọi video từ người quen.", "Chỉ sử dụng các ứng dụng chatbot cũ để giao tiếp trực tuyến."], ans: "A" },
            { ch: 6, c: 17, q: "Quy định chuẩn về độ dài tối thiểu của một mật khẩu mạnh để bảo vệ tài khoản trực tuyến an toàn là bao nhiêu ký tự?", arr: ["Ít nhất 6 ký tự", "Ít nhất 8 ký tự", "Ít nhất 10 ký tự", "Ít nhất 12 ký tự"], ans: "D" },
