            { ch: 6, c: 18, q: "Nguyên tắc quan trọng nhất khi thiết lập mật khẩu cho nhiều tài khoản trực tuyến khác nhau là gì?", arr: ["Dùng chung một mật khẩu mạnh cho tất cả tài khoản để tránh bị quên.", "Sử dụng các mật khẩu khác nhau và tuyệt đối không dùng lại mật khẩu cũ cho tài khoản mới.", "Đặt mật khẩu tăng dần theo ký tự số thứ tự tài khoản.", "Chia sẻ mật khẩu với các thành viên làm việc chung nhóm để hỗ trợ đăng nhập."], ans: "B" },
            { ch: 6, c: 19, q: "Khi truy cập mạng Wi-Fi công cộng tại quán cà phê hoặc sân bay, công cụ nào là bắt buộc để tạo đường hầm mã hóa bảo vệ dữ liệu cá nhân không bị theo dõi?", arr: ["Trình duyệt ẩn danh (Incognito)", "Phần mềm diệt virus (Antivirus)", "Mạng riêng ảo (VPN)", "Tường lửa hệ thống (Firewall)"], ans: "C" },
            { ch: 6, c: 20, q: "Áp dụng Quy tắc sao lưu dữ liệu 3-2-1, sinh viên cần thực hiện việc lưu trữ dữ liệu học tập và đồ án như thế nào?", arr: ["Có 3 bản sao, lưu trên 1 loại thiết bị, đặt ở 2 địa điểm khác nhau.", "Có 3 bản sao, lưu trên 2 loại phương tiện khác nhau, và ít nhất 1 bản sao lưu ở một địa điểm khác (off-site).", "Có 2 bản sao, lưu trên 3 loại phương tiện khác nhau, đặt ở 1 địa điểm cố định.", "Chỉ cần 1 bản sao lưu duy nhất trên hệ thống điện toán đám mây."], ans: "B" },
            { ch: 6, c: 21, q: "Triệu chứng khô mắt, mờ mắt, đau đầu xảy ra do ngồi hàng giờ liên tục trước màn hình thiết bị số được gọi là hội chứng gì?", arr: ["Hội chứng sợ bỏ lỡ (FOMO)", "Mỏi mắt kỹ thuật số (Digital Eye Strain)", "Suy giảm thị lực cấp tính", "Hội chứng rối loạn điều tiết ánh sáng"], ans: "B" },
            { ch: 6, c: 22, q: "Quy tắc thực hành hành vi sức khỏe '20-20-20' hướng dẫn người dùng thiết bị số như thế nào?", arr: ["Sau mỗi 20 phút làm việc, nhìn ra xa 20 feet (khoảng 6 mét) trong vòng 20 giây.", "Sau mỗi 20 giờ làm việc, nghỉ ngơi 20 phút tại 20 không gian khác nhau.", "Sau mỗi 20 ngày làm việc, tắt thiết bị số 20 giờ liên tục ở tuổi 20.", "Cứ làm việc 20 phút thì nhắm mắt hoàn toàn trong 20 phút tiếp theo."], ans: "A" },
            { ch: 6, c: 23, q: "Hiện tượng ánh sáng xanh phát ra từ màn hình thiết bị điện tử có thể gây mất ngủ do cơ chế tác động nào đến cơ thể?", arr: ["Làm tăng nhịp tim và huyết áp đột ngột.", "Ức chế quá trình sản xuất melatonin, một hormone giúp điều hòa giấc ngủ.", "Phá hủy các tế bào thần kinh thị giác.", "Làm giảm lượng oxy cung cấp cho não bộ vào ban đêm."], ans: "B" },
            { ch: 6, c: 24, q: "Hội chứng tâm lý lo lắng, bất an rằng bản thân mình đang bỏ lỡ những trải nghiệm thú vị mà bạn bè hoặc người khác trên mạng xã hội đang có được viết tắt là gì?", arr: ["DDoS", "2FA", "FOMO", "Netiquette"], ans: "C" },
            { ch: 6, c: 25, q: "Chiến lược 'Cai nghiện số' (Digital Detox) hướng dẫn người dùng thực hiện hành động nào?", arr: ["Tẩy chay hoàn toàn công nghệ số và chuyển sang dùng thiết bị cơ học vĩnh viễn.", "Dành ra những khoảng thời gian nhất định (như một buổi tối hoặc ngày cuối tuần) hoàn toàn không sử dụng thiết bị số để tâm trí nghỉ ngơi.", "Xóa toàn bộ các tài khoản mạng xã hội cũ để lập tài khoản mới.", "Sử dụng công nghệ liên tục nhưng chỉ xem các nội dung về sức khỏe."], ans: "B" },
            { ch: 6, c: 26, q: "Bộ quy tắc ứng xử, giao tiếp lịch sự, tôn trọng và có trách nhiệm trên không gian Internet được gọi bằng thuật ngữ nào?", arr: ["Netiquette", "Digital Identity", "Team Charter", "Fair Use"], ans: "A" },
            { ch: 6, c: 27, q: "Let rác thải độc hại độc hại và có tốc độ phát triển nhanh nhất thế giới phát sinh từ kỷ nguyên công nghệ được gọi là gì?", arr: ["Rác thải nhựa vi sinh", "Rác thải điện tử (e-waste)", "Khí thải dấu chân carbon", "Chất thải bán dẫn công nghiệp"], ans: "B" },
            { ch: 6, c: 28, q: "Tổ chức ICAI định nghĩa Liêm chính học thuật (Academic Integrity) dựa trên sự cam kết đối với bao nhiêu giá trị cốt lõi?", arr: ["4 giá trị", "5 giá trị", "6 giá trị", "7 giá trị"], ans: "C" },
            { ch: 6, c: 29, q: "Sáu giá trị cốt lõi của Liêm chính học thuật theo chuẩn quốc tế bao gồm những yếu tố nào?", arr: ["Công nghệ, Tốc độ, Sản lượng, Quy mô, Doanh thu, Chất lượng.", "Trung thực, Tin cậy, Công bằng, Tôn trọng, Trách nhiệm, Dũng cảm.", "Kỷ luật, Bí mật, An toàn, Tiết kiệm, Sáng tạo, Đồng thuận.", "Năng lực, Năng suất, Kinh nghiệm, Thành tích, Danh tiếng, Bản quyền."], ans: "B" },
            { ch: 6, c: 30, q: "Hành vi tự tạo ra dữ liệu khảo sát, thông tin nghiên cứu hoặc nguồn trích dẫn hoàn toàn không có thật trong bài báo cáo thực tập thuộc hình thức vi phạm nào?", arr: ["Đạo văn (Plagiarism)", "Bịa đặt (Fabrication)", "Gian lận (Fraud)", "Gian lận hợp đồng (Contract Cheating)"], ans: "B" },
            { ch: 6, c: 31, q: "Việc một sinh viên trả tiền hoặc nhờ một cá nhân/dịch vụ trực tuyến làm hộ toàn bộ bài tập lớn, đồ án tốt nghiệp rồi nộp lên hệ thống dưới tên mình được phân loại vào hành vi nào?", arr: ["Patchwork plagiarism", "Bịa đặt dữ liệu", "Gian lận hợp đồng (Contract Cheating)", "Sử dụng hợp lý sai quy cách"], ans: "C" },
            { ch: 6, c: 32, q: "Quá trình đọc hiểu sâu sắc ý tưởng của tác giả, sau đó trình bày lại hoàn toàn bằng ngôn ngữ và cấu trúc câu của riêng mình, đồng thời bắt buộc trích dẫn nguồn gốc được gọi là gì?", arr: ["Trích dẫn nguyên văn (Quoting)", "Diễn giải hiệu quả (Paraphrasing)", "Tóm tắt nội dung (Summarizing)", "Tạo tác phẩm phái sinh"], ans: "B" },
            { ch: 6, c: 33, q: "Sự khác biệt cốt lõi bắt buộc giữa hành vi 'Trích dẫn nguyên văn' (Quoting) so với hành vi 'Diễn giải' (Paraphrasing) là gì?", arr: ["Trích dẫn nguyên văn không cần ghi năm xuất bản của tài liệu.", "Trích dẫn nguyên văn bắt buộc sử dụng chính xác từng từ và đặt trong dấu ngoặc kép \" \".", "Diễn giải không bắt buộc phải thực hiện việc ghi nguồn tham khảo ở cuối bài.", "Diễn giải bắt buộc phải viết dài hơn văn bản gốc gấp nhiều lần."], ans: "B" },
            { ch: 6, c: 34, q: "Hệ thống phần mềm kiểm tra đạo văn phổ biến Turnitin được các trường đại học tích hợp mang lại tính năng kiểm tra cốt lõi nào?", arr: ["Tự động sửa lỗi chính tả và chấm điểm bài luận thay giảng viên.", "Kiểm tra tỷ lệ tương đồng văn bản của bài viết với hệ thống cơ sở dữ liệu khổng lồ.", "Ngăn chặn tuyệt đối mã độc tống tiền xâm nhập thiết bị sinh viên.", "Tự động tạo danh mục tài liệu tham khảo theo chuẩn Harvard."], ans: "B" },
            { ch: 6, c: 35, q: "Nhận thức nào sau đây là ĐÚNG về bản chất của 'Báo cáo tương đồng' (similarity report) từ phần mềm Turnitin?", arr: ["Tỷ lệ tương đồng hiển thị trên báo cáo chính là tỷ lệ phần trăm đạo văn của bài viết.", "Báo cáo chỉ hiển thị mức độ trùng khớp văn bản thô, người dùng phải tự phân tích xem sự trùng khớp đó có phải là đạo văn hay không.", "Báo cáo khẳng định bài viết hoàn toàn không vi phạm đạo đức nếu tỷ lệ hiển thị bằng 0%.", "Báo cáo tự động loại bỏ các đoạn trích dẫn nằm trong dấu ngoặc kép."], ans: "B" },
            { ch: 6, c: 36, q: "Các công cụ công nghệ như Zotero hay Mendeley được thiết kế với tính năng chính là gì để hỗ trợ sinh viên học tập chuyên nghiệp?", arr: ["Kiểm tra lỗi ngữ pháp tiếng Anh và phát hiện văn bản do AI tạo ra.", "Quản lý tài liệu tham khảo, tự động chèn trích dẫn và tạo danh mục tham khảo theo chuẩn quy định.", "Quét virus và dọn dẹp các tệp tin rác điện tử trên máy tính.", "Tổ chức các cuộc họp trực tuyến đồng bộ thời gian thực cho nhóm."], ans: "B" },
            { ch: 6, c: 37, q: "Hiện tượng AI tạo ra các sự kiện, số liệu, thông tin sai sự thật hoặc các trích dẫn tài liệu khoa học không hề tồn tại nhưng trình bày rất thuyết phục được gọi là:", arr: ["Ảo giác của AI (AI Hallucinations)", "Thiên kiến trong AI (AI Bias)", "Đạo văn do AI hỗ trợ", "Thuê ngoài tư duy hệ thống"], ans: "A" },
            { ch: 6, c: 38, q: "Khi thực hiện trích dẫn một câu trả lời từ công cụ ChatGPT (do nhà phát triển OpenAI sản xuất năm 2024) không có URL chia sẻ công khai theo chuẩn Harvard trong danh mục tham khảo, cấu trúc nào sau đây là đúng?", arr: ["(OpenAI, 2024) ChatGPT. URL.", "OpenAI (2024). *ChatGPT: Phản hồi cho [Tên người dùng], Ngày Tháng.*", "ChatGPT (2024). OpenAI: Phản hồi hệ thống trực tuyến.", "OpenAI Inc. *Phản hồi của mô hình ngôn ngữ lớn ChatGPT năm 2024.*"], ans: "B" },
            { ch: 6, c: 39, q: "Văn bản pháp luật nào của Việt Nam quy định rõ việc các tổ chức khi thu thập và xử lý dữ liệu cá nhân bắt buộc phải có sự đồng ý rõ ràng của chủ thể dữ liệu, có hiệu lực từ tháng 7/2023?", arr: ["Luật An ninh mạng 2018", "Luật Sở hữu trí tuệ", "Nghị định 13/2023/NĐ-CP về bảo vệ dữ liệu cá nhân", "Luật Bảo vệ dữ liệu cá nhân 2025"], ans: "C" },
            { ch: 6, c: 40, q: "Luật Bảo vệ dữ liệu cá nhân 2025 (Luật số 91/2025/QH15) của Việt Nam chính thức có hiệu lực thi hành kể từ thời điểm nào?", arr: ["Ngày 01 tháng 07 năm 2025", "Ngày 01 tháng 01 năm 2026", "Ngày 01 tháng 06 năm 2026", "Ngày 01 tháng 01 năm 2027"], ans: "B" },

            // === CHƯƠNG 7: ỨNG DỤNG CÔNG NGHỆ SỐ TRONG Y - SINH (CÂU 1 - 20) ===
            { ch: 7, c: 1, q: "Cơ sở dữ liệu y-sinh học miễn phí lớn nhất thế giới về trích dẫn và tóm tắt tài liệu y khoa do Trung tâm Thông tin Công nghệ sinh học Quốc gia (NCBI) Hoa Kỳ phát triển có tên là gì?", arr: ["GenBank", "PubMed", "Protein Data Bank", "Semantic Scholar"], ans: "B" },
            { ch: 7, c: 2, q: "Kho lưu trữ toàn cầu duy nhất về thông tin cấu trúc 3D của các đại phân tử sinh học như protein và axit nucleic là:", arr: ["GenBank", "Protein Data Bank (PDB)", "PMC Central", "INSDC"], ans: "B" },
            { ch: 7, c: 3, q: "Công cụ tìm kiếm học thuật miễn phí nào ứng dụng AI để tìm các mối kết nối giữa các bài báo khoa học và có tính năng tóm tắt bài báo bằng một câu ngắn gọn?", arr: ["Elicit", "Consensus", "Semantic Scholar", "PubMed"], ans: "C" },
            { ch: 7, c: 4, q: "Tính năng độc đáo 'Thước đo đồng thuận' (Consensus Meter) dùng để hiển thị mức độ đồng thuận của cộng đồng khoa học về một vấn đề cụ thể thuộc về công cụ AI nào?", arr: ["GenBank", "Elicit", "Consensus", "PubMed Central"], ans: "C" },
            { ch: 7, c: 5, q: "Xu hướng chuyển đổi phương pháp chăm sóc sức khỏe từ 'một kích cỡ cho tất cả' sang tính đến sự khác biệt về gen, môi trường và lối sống của từng cá nhân được gọi là gì?", arr: ["Y học thực chứng", "Y học cộng đồng", "Y học cá thể hóa (personalized medicine)", "Y học từ xa nâng cao"], ans: "C" },
            { ch: 7, c: 6, q: "Kỹ thuật tích hợp dữ liệu đa nguồn (Multi-modal Data Integration) trong y học cá thể hóa thực hiện việc kết hợp các nguồn dữ liệu nào?", arr: ["Chỉ kết hợp dữ liệu giải trình tự gen di truyền của bệnh nhân.", "Kết hợp hồ sơ bệnh án điện tử, kết quả xét nghiệm, hình ảnh y tế và dữ liệu từ thiết bị đeo thông minh.", "Kết hợp các bài báo khoa học y khoa trên hệ thống PubMed.", "Kết hợp các công thức hóa học của các phân tử thuốc mới."], ans: "B" },
            { ch: 7, c: 7, q: "Mô hình học sâu nào được ứng dụng như một trợ thủ đắc lực cho bác sĩ trong việc quét qua hình ảnh y tế bằng các 'bộ lọc' nhỏ để tự động phát hiện, phân đoạn tổn thương?", arr: ["Mô hình ngôn ngữ lớn (LLMs)", "Mạng đối nghịch tạo sinh (GANs)", "Mạng Nơ-ron Tích chập (CNNs)", "Mô hình khuếch tán (diffusion models)"], ans: "C" },
            { ch: 7, c: 8, q: "Một phần mềm ứng dụng AI tiêu biểu tại Việt Nam đã được triển khai tại hơn 100 bệnh viện để hỗ trợ bác sĩ chẩn đoán các bệnh về tim, phổi, xương trên ảnh X-quang là gì?", arr: ["GeneStoryAI", "DrAid™ của VinBrain", "C-Aid của CMC", "AlphaFold"], ans: "B" },
            { ch: 7, c: 9, q: "Khi sử dụng các mô hình ngôn ngữ lớn (LLMs) để soạn thảo và biên tập tài liệu y khoa, vai trò bắt buộc của con người được quy định như thế nào?", arr: ["Có thể tin tưởng hoàn toàn vào văn phong và tính chính xác do AI tạo ra.", "AI đã được huấn luyện chuyên sâu nên không cần con người rà soát lại.", "Mọi nội dung do AI tạo ra bắt buộc phải được rà soát và kiểm chứng cẩn thận bởi chuyên gia y tế.", "Chỉ sử dụng AI để dịch thuật từ ngữ, không dùng để tóm tắt hồ sơ bệnh án."], ans: "C" },
            { ch: 7, c: 10, q: "Trong quản lý y tế và y tế từ xa (Telemedicine), AI giúp tự động hóa quy trình hành chính, tối ưu hóa luồng bệnh nhân và thực hiện nhiệm vụ RPM. Ký hiệu 'RPM' nghĩa là gì?", arr: ["Quản lý bệnh viện thông minh (Smart Hospital Management)", "Giám sát bệnh nhân từ xa (Remote Patient Monitoring)", "Hồ sơ bệnh án điện tử trực tuyến (Electronic Health Record)", "Dự đoán số lượng bệnh nhân lâm sàng (Patient Prediction Model)"], ans: "B" },
            { ch: 7, c: 11, q: "Trong quy trình ứng dụng AI để nghiên cứu và phát triển thuốc (Drug Discovery), giai đoạn phân tích dữ liệu sinh học để tìm ra một loại protein liên quan đến bệnh mà thuốc cần tác động vào được gọi là:", arr: ["Thiết kế phân tử thuốc (Molecule Generation)", "Xác định mục tiêu (Target Identification)", "Dự đoán hiệu quả và độc tính", "Tối ưu hóa thử nghiệm lâm sàng"], ans: "B" },
            { ch: 7, c: 12, q: "Hệ thống AI mang tính đột phá của Google DeepMind có khả năng giải bài toán thách thức suốt 50 năm của khoa học bằng cách dự đoán chính xác cấu trúc 3D của protein là gì?", arr: ["DrAid", "AlphaFold", "Consensus", "PubMed Central"], ans: "B" },
            { ch: 7, c: 13, q: "Hiện tượng thuật toán AI đưa ra quyết định phiến diện, không công bằng do học từ nguồn dữ liệu huấn luyện vốn chứa đựng những bất bình đẳng, định kiến xã hội sẵn có được gọi là gì?", arr: ["Ảo giác thuật toán (Algorithmic Hallucination)", "Thiên kiến thuật toán (Algorithmic Bias)", "Trách nhiệm pháp lý công nghệ", "Vi phạm bảo mật dữ liệu nhạy cảm"], ans: "B" },
            { ch: 7, c: 14, q: "Tại Việt Nam, văn bản pháp luật nào quy định rõ ràng về quyền của chủ thể dữ liệu và trách nhiệm của bên xử lý đối với 'dữ liệu cá nhân nhạy cảm' liên quan đến sức khỏe?", arr: ["Luật An ninh mạng 2018", "Luật Sở hữu trí tuệ", "Nghị định 13/2023/NĐ-CP về bảo vệ dữ liệu cá nhân", "Luật Bảo vệ dữ liệu cá nhân 2025"], ans: "C" },
            { ch: 7, c: 15, q: "Về mặt trách nhiệm pháp lý (Liability), khi hệ thống AI y tế chẩn đoán sai và gây tổn hại cho sức khỏe bệnh nhân, khung pháp lý hiện tại quy định trách nhiệm cuối cùng thuộc về ai?", arr: ["Nhà cung cấp dịch vụ y tế và bác sĩ điều trị trực tiếp.", "Kỹ sư lập trình ra thuật toán AI tạo sinh.", "Công ty công nghệ cung cấp thiết bị và phần mềm AI.", "Hệ thống tự động chịu trách nhiệm giảm trừ năng lực hoạt động."], ans: "A" },
            { ch: 7, c: 16, q: "Ứng dụng y học nào sau đây sử dụng thuật toán học máy để phân tích khối lượng dữ liệu di truyền khổng lồ nhằm xác định các biến thể gen liên quan đến nguy cơ mắc bệnh ung thư?", arr: ["Phân tích dữ liệu gen (Genomic Data Analysis)", "Giám sát bệnh nhân từ xa (RPM)", "Thiết kế phân tử thuốc tự động", "Tóm tắt hồ sơ bệnh án điện tử"], ans: "A" },
            { ch: 7, c: 17, q: "Các mô hình AI tạo sinh sử dụng thuật toán nào sau đây để thiết kế ra các phân tử thuốc hoàn toàn mới dựa trên các tiêu chí tối ưu đã chọn?", arr: ["Mạng Nơ-ron Tích chập (CNNs)", "Mạng đối nghịch tạo sinh (GANs) và mô hình khuếch tán", "Thuật toán Xử lý Ngôn ngữ Tự nhiên (NLP)", "Hệ quản trị cơ sở dữ liệu PubMed"], ans: "B" },
            { ch: 7, c: 18, q: "Nguyên nhân cốt lõi nào khiến các Mô hình Ngôn ngữ Lớn (LLMs) có khả năng tự động viết các bản nháp tài liệu y khoa đạt chất lượng chuyên môn?", arr: ["Chúng có khả năng tư duy lâm sàng độc lập giống như một bác sĩ thực thụ.", "Chúng được huấn luyện trên một kho văn bản khổng lồ gồm hàng triệu tài liệu y khoa để học văn phong, cấu trúc và thuật ngữ chuyên ngành.", "Chúng tự động kết nối với các thiết bị đeo thông minh của bệnh nhân để lấy dữ liệu.", "Chung sử dụng Mạng Nơ-ron Tích chập để nhận diện các cạnh, góc của văn bản."], ans: "B" },
            { ch: 7, c: 19, q: "Khi một sinh viên ngành y-sinh muốn tìm kiếm kho dữ liệu công khai toàn diện về trình tự DNA và RNA, cơ sở dữ liệu nào là lựa chọn bắt buộc?", arr: ["PubMed Central", "GenBank", "Protein Data Bank", "Semantic Scholar"], ans: "B" },
            { ch: 7, c: 20, q: "Khung pháp lý quốc tế nổi tiếng của Mỹ đặt ra các tiêu chuẩn nghiêm ngặt nhằm bảo vệ quyền riêng tư dữ liệu y tế của bệnh nhân được viết tắt là gì?", arr: ["GDPR", "HIPAA", "ICAI", "SMART"], ans: "B" } ]
        ;

        let correctCount = 0;
        let attemptedCount = 0;
        const userAnswers = {};

        const filterSelect = document.getElementById("chapterFilter");
        const searchBox = document.getElementById("searchBox");
        const quizContainer = document.getElementById("quizContainer");
        const scoreDisplay = document.getElementById("scoreDisplay");
        const progressBar = document.getElementById("progressBar");

        function renderQuiz() {
            const selectedChapter = filterSelect.value;
            const searchKeyword = searchBox.value.trim().toLowerCase();
            quizContainer.innerHTML = "";

            const filteredQuestions = quizData.filter(item => {
                const matchChapter = (selectedChapter === "all" || item.ch.toString() === selectedChapter);
                const matchKeyword = item.q.toLowerCase().includes(searchKeyword);
                return matchChapter && matchKeyword;
            });

            if (filteredQuestions.length === 0) {
                quizContainer.innerHTML = `<div class="text-center py-12 text-slate-400 font-medium">❌ Không tìm thấy câu hỏi phù hợp với bộ lọc hoặc từ khóa.</div>`;
                return;
            }

            filteredQuestions.forEach((item) => {
                const qUniqueId = item.ch + "_" + item.c;
                const card = document.createElement("div");
                card.className = "bg-white p-6 rounded-2xl shadow-xs border border-slate-200 transition duration-200 hover:shadow-md";
                
                card.innerHTML = `
                    <div class="flex items-start gap-2.5 mb-4">
                        <span class="bg-indigo-100 text-indigo-700 text-[11px] font-black px-2.5 py-1 rounded-md shrink-0 mt-0.5">Chương ${item.ch} - Câu ${item.c}</span>
                        <h3 class="font-bold text-slate-900 text-base leading-relaxed">${item.q}</h3>
                    </div>
                    <div class="grid grid-cols-1 gap-2.5 shadow-none" id="options_block_${qUniqueId}"></div>
                `;

                quizContainer.appendChild(card);
                
                const optionsBlock = card.querySelector("#options_block_" + qUniqueId);
                const labels = ["A", "B", "C", "D"];

                item.arr.forEach((optionText, i) => {
                    const currentLetter = labels[i];
                    const btn = document.createElement("button");
                    btn.className = "w-full text-left px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 hover:bg-slate-100/80 text-sm font-semibold text-slate-700 transition cursor-pointer flex items-center gap-3";
                    btn.innerHTML = `<span class="w-6 h-6 flex items-center justify-center rounded-full bg-white border border-slate-300 text-xs font-black text-slate-500 shrink-0">${currentLetter}</span> <span class="text-slate-700 leading-normal">${optionText}</span>`;
                    
                    // Khôi phục trạng thái nếu đã làm câu này rồi
                    if (userAnswers[qUniqueId]) {
                        btn.classList.remove("hover:bg-slate-100", "cursor-pointer");
                        if (currentLetter === item.ans) {
                            btn.classList.add("bg-emerald-50", "border-emerald-300", "text-emerald-900");
                            btn.querySelector("span").className = "w-6 h-6 flex items-center justify-center rounded-full bg-emerald-500 border-emerald-500 text-xs font-black text-white shrink-0";
                        }
                        if (currentLetter === userAnswers[qUniqueId] && userAnswers[qUniqueId] !== item.ans) {
                            btn.classList.add("bg-rose-50", "border-rose-300", "text-rose-900");
                            btn.querySelector("span").className = "w-6 h-6 flex items-center justify-center rounded-full bg-rose-500 border-rose-500 text-xs font-black text-white shrink-0";
                        }
                    } else {
                        btn.onclick = () => handleAnswerSelect(qUniqueId, currentLetter, item.ans, optionsBlock);
                    }
                    
                    optionsBlock.appendChild(btn);
                });
            });
        }

        function handleAnswerSelect(questionId, chosenLetter, correctLetter, optionsBlock) {
            if (userAnswers[questionId]) return;

            userAnswers[questionId] = chosenLetter;
            attemptedCount++;

            const allButtons = optionsBlock.querySelectorAll("button");
            const labels = ["A", "B", "C", "D"];

            allButtons.forEach((btn, index) => {
                const currentLetter = labels[index];
                const circleSpan = btn.querySelector("span");
                
                btn.classList.remove("hover:bg-slate-100", "cursor-pointer");
                btn.onclick = null;

                if (currentLetter === correctLetter) {
                    btn.classList.add("bg-emerald-50", "border-emerald-300", "text-emerald-900");
                    circleSpan.className = "w-6 h-6 flex items-center justify-center rounded-full bg-emerald-500 border-emerald-500 text-xs font-black text-white shrink-0";
                }
                
                if (currentLetter === chosenLetter && chosenLetter !== correctLetter) {
                    btn.classList.add("bg-rose-50", "border-rose-300", "text-rose-900");
                    circleSpan.className = "w-6 h-6 flex items-center justify-center rounded-full bg-rose-500 border-rose-500 text-xs font-black text-white shrink-0";
                }
            });

            if (chosenLetter === correctLetter) {
                correctCount++;
            }

            // Cập nhật điểm và thanh tiến độ tổng thể
            scoreDisplay.innerText = correctCount + " / " + attemptedCount;
            const progressPercent = (attemptedCount / quizData.length) * 100;
            progressBar.style.width = progressPercent + "%";
        }

        filterSelect.onchange = () => { renderQuiz(); };
        searchBox.oninput = () => { renderQuiz(); };
        
        renderQuiz();
    </script>
</body>
